<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>SuperRapido V4 - 极速丝滑版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { background-color: #f8fafc; touch-action: manipulation; }
        .table-container { max-height: 80vh; overflow: auto; border: 1px solid #e2e8f0; }
        /* 数量框高亮 */
        .qty-input { border: 2px solid #2563eb !important; background: #f0f7ff !important; font-weight: 800; text-align: center; }
        /* 隐藏箭头 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        /* 列宽调节敏感区：整条线都是感应区 */
        .resizer {
            position: absolute; right: -5px; top: 0; width: 15px; height: 100%;
            z-index: 20; cursor: col-resize; touch-action: none;
        }
        .resizer:active { border-right: 3px solid #2563eb; }
        @keyframes scanLine { 0% { transform: translateY(0); } 100% { transform: translateY(280px); } }
        .scanner-line { animation: scanLine 2s linear infinite; }
    </style>
</head>
<body class="p-2">
    <div id="app" class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-3">
            <h1 class="text-2xl font-black text-blue-800 italic">SuperRapido <span class="text-xs font-normal opacity-40">V4 ULTRA</span></h1>
            <button onclick="resetSystem()" class="text-[10px] text-gray-400 underline">重置</button>
        </div>

        <div class="flex gap-2 mb-4">
            <label class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                📂 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="手动输条码..." class="flex-1 border-2 border-blue-100 rounded-2xl px-4 text-lg focus:border-blue-500 outline-none shadow-sm" />
                <button onclick="startUltraScan()" class="bg-blue-600 text-white px-6 rounded-2xl font-bold shadow-lg flex items-center gap-2 active:bg-blue-800">
                    📷 扫码
                </button>
            </div>
        </div>

        <div class="table-container bg-white rounded-xl shadow-inner">
            <table class="border-collapse table-fixed w-max">
                <thead id="tHead" class="sticky top-0 bg-gray-100 z-30"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <button onclick="exportData()" class="mt-4 bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-[0.98]">
            保存并导出 EXCEL
        </button>

        <div id="scannerModal" class="fixed inset-0 bg-black z-[999] hidden flex-col">
            <div class="p-6 flex justify-between text-white">
                <span class="font-bold">极速扫描中...</span>
                <button onclick="stopUltraScan()" class="bg-white/20 px-6 py-2 rounded-full">关闭</button>
            </div>
            <div class="flex-1 relative flex items-center justify-center">
                <video id="videoFeed" class="absolute inset-0 w-full h-full object-cover"></video>
                <div class="relative w-72 h-72 border-2 border-blue-400/50 rounded-3xl bg-blue-500/5 overflow-hidden">
                    <div class="scanner-line w-full h-1 bg-blue-400 shadow-[0_0_15px_#60a5fa]"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('SR_V4_DATA')) || [];
        let cols = JSON.parse(localStorage.getItem('SR_V4_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem('SR_V4_WIDTHS')) || {};
        const codeReader = new ZXing.BrowserMultiFormatReader();

        function init() {
            if (cols.length) render();
            document.getElementById('fileInput').onchange = loadExcel;
            document.getElementById('manualInput').onkeydown = (e) => e.key === 'Enter' && processCode(e.target.value);
        }

        function render() {
            const head = document.getElementById('tHead');
            const body = document.getElementById('tBody');
            
            // 渲染表头：带点击换位和灵敏隔线
            head.innerHTML = `<tr>${cols.map((c, i) => `
                <th class="relative p-3 border-r border-b border-gray-300 text-sm font-bold text-gray-700 bg-gray-50" style="width: ${widths[c] || 150}px">
                    <div class="flex flex-col items-start gap-1">
                        <span class="truncate w-full">${c}</span>
                        <div class="flex gap-2">
                            <button onclick="shift(${i},-1)" class="text-[10px] bg-white border px-1 rounded hover:bg-blue-50">◀</button>
                            <button onclick="shift(${i},1)" class="text-[10px] bg-white border px-1 rounded hover:bg-blue-50">▶</button>
                        </div>
                    </div>
                    <div class="resizer" ontouchstart="startResizing(event, '${c}')" onmousedown="startResizing(event, '${c}')"></div>
                </th>`).join('')}</tr>`;

            body.innerHTML = db.map((row, rIdx) => `
                <tr class="hover:bg-blue-50/50" id="row-${rIdx}">
                    ${cols.map(c => `
                        <td class="border-r border-b border-gray-200 p-1">
                            <input type="${c==='实际数量'?'number':'text'}" 
                                value="${row[c]||''}" 
                                class="w-full h-10 px-2 outline-none bg-transparent ${c==='实际数量'?'qty-input':''}"
                                onchange="edit(${rIdx},'${c}',this.value)"
                                ${c==='实际数量'?'inputmode="decimal"':''}/>
                        </td>`).join('')}
                </tr>`).join('');
        }

        // 核心：灵敏隔线缩放
        function startResizing(e, colName) {
            e.preventDefault();
            const startX = e.touches ? e.touches[0].pageX : e.pageX;
            const startW = widths[colName] || 150;
            
            const onMove = (ev) => {
                const currentX = ev.touches ? ev.touches[0].pageX : ev.pageX;
                widths[colName] = Math.max(60, startW + (currentX - startX));
                render();
            };
            
            const onEnd = () => {
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('mousemove', onMove);
                save();
            };
            
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchend', onEnd, { once: true });
            document.addEventListener('mouseup', onEnd, { once: true });
        }

        // 核心：极速扫码（Replit同款优化）
        async function startUltraScan() {
            document.getElementById('scannerModal').style.display = 'flex';
            try {
                const videoConstraints = { video: { facingMode: "environment", focusMode: "continuous", width: { ideal: 1280 }, height: { ideal: 720 } } };
                codeReader.decodeFromConstraints(videoConstraints, 'videoFeed', (result, err) => {
                    if (result) {
                        ding();
                        processCode(result.getText());
                        stopUltraScan();
                    }
                });
            } catch (e) { alert("摄像头打不开"); stopUltraScan(); }
        }

        function stopUltraScan() { codeReader.reset(); document.getElementById('scannerModal').style.display = 'none'; }

        function processCode(code) {
            const barcodeKey = cols.find(c => c.includes('条') || c.includes('码') || c.includes('COD')) || cols[0];
            const foundIdx = db.findIndex(r => String(r[barcodeKey]).trim() === String(code).trim());
            
            if (foundIdx !== -1) {
                db[foundIdx]['实际数量'] = (parseFloat(db[foundIdx]['实际数量']) || 0) + 1;
                save(); render();
                const targetRow = document.getElementById(`row-${foundIdx}`);
                targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetRow.classList.add('bg-yellow-200');
                setTimeout(() => targetRow.classList.remove('bg-yellow-200'), 1500);
            } else {
                alert("未找到条码: " + code);
            }
            document.getElementById('manualInput').value = '';
        }

        function ding() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function shift(idx, dir) {
            const target = idx + dir;
            if (target < 0 || target >= cols.length) return;
            [cols[idx], cols[target]] = [cols[target], cols[idx]];
            save(); render();
        }

        function edit(idx, col, val) { db[idx][col] = val; save(); }
        function save() { 
            localStorage.setItem('SR_V4_DATA', JSON.stringify(db)); 
            localStorage.setItem('SR_V4_COLS', JSON.stringify(cols)); 
            localStorage.setItem('SR_V4_WIDTHS', JSON.stringify(widths));
        }

        function loadExcel(e) {
            const f = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, { type: 'binary' });
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                cols = Object.keys(data[0]);
                if (!cols.includes('实际数量')) cols.unshift('实际数量');
                db = data; save(); render();
            };
            reader.readAsBinaryString(f);
        }

        function exportData() {
            const ws = XLSX.utils.json_to_sheet(db, { header: cols });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_V4_${new Date().getTime()}.xlsx`);
        }

        function resetSystem() { if(confirm("确定彻底清空吗？")) { localStorage.clear(); location.reload(); } }
        
        init();
    </script>
</body>
</html>
