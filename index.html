<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V50 PRO UI FIX</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif}

.btn{
padding:14px;
font-size:20px;
border-radius:12px;
margin:5px;
width:120px;
}

.big{
width:160px;
font-size:22px;
}

.table-container{
background:#fff;
color:#000;
height:40vh;
overflow:auto;
border-radius:10px;
}

th{position:sticky;top:0;background:#111;color:#fff}

.qty-input{
height:55px;
font-size:20px;
text-align:center;
}

.row-focus{background:#fde047}

#toast{
position:fixed;
top:15%;
left:50%;
transform:translateX(-50%);
padding:15px;
border-radius:10px;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<div id="toast"></div>

<!-- 顶部操作 -->
<div class="flex justify-center flex-wrap bg-black p-2">

<button onclick="startScanning()" class="btn big bg-blue-600">扫码</button>

<input id="manualInput" placeholder="条码"
class="text-black p-3 text-lg w-40 rounded">

<button onclick="manual()" class="btn bg-gray-600">确认</button>

<input type="file" id="fileInput" class="btn bg-white text-black">

</div>

<!-- 扫码区域 -->
<div id="scanUI" style="height:30vh;background:#000">
<video id="video" style="width:100%;height:100%" autoplay playsinline></video>
</div>

<!-- 底部操作 -->
<div class="flex justify-center flex-wrap bg-black p-2">

<button onclick="exportExcel()" class="btn bg-green-600">导出</button>

<button onclick="openColModal()" class="btn bg-purple-600">列管理</button>

<button onclick="stopScanning()" class="btn bg-red-600">停止</button>

</div>

<!-- 表格 -->
<div class="table-container">
<table>
<thead id="tHead"></thead>
<tbody id="tBody"></tbody>
</table>
</div>

<!-- 列管理 -->
<div id="colModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9)">
<div style="background:#fff;color:#000;margin:10% auto;padding:20px;width:90%">
<h3>列排序（上下按钮）</h3>
<div id="colList"></div>
<button onclick="closeColModal()">完成</button>
</div>
</div>

<script>

let db=[],columns=[];

/* ===== toast ===== */
function showToast(msg,color="red"){
toast.innerText=msg;
toast.style.background=color;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",1500);
}

/* ===== Excel ===== */
fileInput.onchange=e=>{
let f=e.target.files[0];
let r=new FileReader();

r.onload=ev=>{
let wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
let json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});

columns=Object.keys(json[0]);

if(!columns.includes("实际数量")){
columns.unshift("实际数量");
json.forEach(r=>r["实际数量"]="");
}

db=json;
save();
render();
};

r.readAsArrayBuffer(f);
};

/* ===== 渲染 ===== */
function render(){
tHead.innerHTML="<tr>"+columns.map(c=>"<th>"+c+"</th>").join("")+"</tr>";

tBody.innerHTML=db.map((r,i)=>`
<tr id="r-${i}">
${columns.map(c=>`
<td><input value="${r[c]||""}"
class="${c=="实际数量"?"qty-input":""}"
onchange="edit(${i},'${c}',this.value)"></td>
`).join("")}
</tr>`).join("");
}

function edit(i,c,v){db[i][c]=v;save();}

/* ===== 扫码 ===== */
let reader=new ZXing.BrowserMultiFormatReader();

function startScanning(){
reader.decodeFromVideoDevice(null,"video",(res)=>{
if(res) handle(res.getText());
});
}

function stopScanning(){reader.reset();}

/* ===== 条码 ===== */
function normalize(v){return String(v).trim().toLowerCase();}

function handle(code){

let idx=db.findIndex(r=>
Object.values(r).some(v=>normalize(v)==normalize(code))
);

if(idx!=-1){

render();

document.querySelectorAll("tr").forEach(tr=>tr.classList.remove("row-focus"));

let row=document.getElementById("r-"+idx);
row.classList.add("row-focus");
row.scrollIntoView({block:"center"});

}else{
showToast("未找到:"+code);
}
}

/* ===== 手动 ===== */
function manual(){
handle(manualInput.value);
manualInput.value="";
}

/* ===== 导出 ===== */
function exportExcel(){
let ws=XLSX.utils.json_to_sheet(db,{header:columns});
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"data");
XLSX.writeFile(wb,"库存.xlsx");
}

/* ===== 本地 ===== */
function save(){
localStorage.setItem("db",JSON.stringify(db));
localStorage.setItem("columns",JSON.stringify(columns));
}

db=JSON.parse(localStorage.getItem("db"))||[];
columns=JSON.parse(localStorage.getItem("columns"))||[];

if(columns.length)render();

/* ===== 列管理（上下按钮版） ===== */
function openColModal(){
colModal.style.display="block";
renderColList();
}

function closeColModal(){colModal.style.display="none";}

function renderColList(){
colList.innerHTML=columns.map((c,i)=>`
<div style="padding:10px;border:1px solid #ccc;margin:5px">

${c}

<button onclick="moveUp(${i})">⬆</button>
<button onclick="moveDown(${i})">⬇</button>
<button onclick="deleteCol('${c}')" style="color:red">删除</button>

</div>
`).join("");
}

function moveUp(i){
if(i===0)return;
[columns[i],columns[i-1]]=[columns[i-1],columns[i]];
updateCols();
}

function moveDown(i){
if(i===columns.length-1)return;
[columns[i],columns[i+1]]=[columns[i+1],columns[i]];
updateCols();
}

function updateCols(){
save();
renderColList();
render();
}

function deleteCol(c){
columns=columns.filter(x=>x!=c);
updateCols();
}

</script>

</body>
</html>
