<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V25 - 智能适配版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; }
        .table-container { background: white; border: 2px solid #334155; height: 68vh; overflow: auto; border-radius: 12px; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 2px solid #475569; border-bottom: 4px solid #000; padding: 12px 8px; font-size: 14px; }
        td { border-right: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; padding: 2px; background: white; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; background: #fff; font-weight: 900; text-align: center; font-size: 2.2rem; color: #000; border-radius: 8px; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; z-index: 10; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 20px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; font-size: 1.2rem; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); min-width: 85%; }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>
    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-slate-900 italic">V25 <span class="text-xs font-normal bg-green-400 px-1 rounded">智能适配</span></h1>
            <button onclick="fullReset()" class="bg-red-600 text-white text-[10px] px-2 py-1 rounded font-bold uppercase">重置数据</button>
        </div>

        <div class="flex gap-1 mb-3 bg-white p-2 rounded-2xl shadow-lg border-2 border-slate-200">
            <button onclick="startScanning()" class="bg-blue-600 text-white w-16 h-16 flex items-center justify-center rounded-xl active:scale-90 shadow-md text-3xl">📷</button>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="输入条码/CODIGO..." 
                    class="flex-1 border-2 border-slate-300 rounded-xl px-3 font-black text-lg outline-none focus:border-blue-600" />
                <button id="multiBtn" class="bg-slate-800 text-white px-3 rounded-xl font-black text-xs">确认<br><span class="text-[9px] text-slate-400">长按清空</span></button>
            </div>
            <label class="bg-slate-100 text-slate-500 w-12 h-16 flex items-center justify-center rounded-xl border border-slate-300">
                📂<input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
        </div>

        <div class="table-container">
            <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <button onclick="exportExcel()" class="mt-3 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl shadow-2xl active:bg-emerald-900 transition-all">💾 导出保存 EXCEL</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-6 flex justify-between items-center bg-slate-900 text-white border-b border-green-500">
            <span class="font-black text-xl text-green-400">正在快速对焦...</span>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-3 rounded-full font-black text-lg">退出</button>
        </div>
        <div class="relative flex-1 bg-black overflow-hidden">
            <video id="v" class="w-full h-full object-cover"></video>
            <div class="absolute inset-0 border-2 border-green-500/50 m-16 pointer-events-none shadow-[0_0_0_2000px_rgba(0,0,0,0.6)]">
                <div class="absolute top-1/2 left-0 w-full h-1 bg-green-500 shadow-[0_0_15px_#22c55e] animate-pulse"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('SR25_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem('SR25_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem('SR25_W')) || {};
        const zxing = new ZXing.BrowserMultiFormatReader();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        const multiBtn = document.getElementById('multiBtn');
        const manualInput = document.getElementById('manualInput');
        let pressTimer;
        multiBtn.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => { manualInput.value = ''; showMsg("已清空", false); if(navigator.vibrate) navigator.vibrate(50); pressTimer = null; }, 700);
        });
        multiBtn.addEventListener('touchend', (e) => { if (pressTimer) { clearTimeout(pressTimer); handleBarcode(manualInput.value); pressTimer = null; } });

        function showMsg(txt, isErr=true) {
            const el = document.getElementById('toast'); 
            el.innerHTML = isErr ? `❌ 找不到内容<br><span class="text-sm font-normal">输入值: ${txt}</span>` : txt;
            el.style.display = 'block'; el.style.background = isErr ? '#e11d48' : '#10b981';
            setTimeout(() => el.style.display = 'none', 2500);
        }

        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `<th id="th-${c}" style="width: ${widths[c] || 150}px"><div>${c}</div><div class="resizer" ontouchstart="doResize(event, '${c}')"></div></th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `<tr id="r-${rIdx}">${columns.map(c => `<td><input id="in-${rIdx}-${c}" type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'text-input'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`).join('')}</tr>`).join('');
        }

        function handleBarcode(code) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            
            // 搜索逻辑：先在常见条码标题列找，找不到再全表找
            const rowIndex = db.findIndex(row => {
                return Object.values(row).some(val => String(val).trim().toLowerCase() === target);
            });

            if (rowIndex !== -1) {
                playSound(1000); stopScanning(); render();
                const rowEl = document.getElementById(`r-${rowIndex}`);
                const inputEl = document.getElementById(`in-${rowIndex}-实际数量`);
                document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                rowEl.classList.add('row-focus');
                rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => { inputEl.focus(); inputEl.select(); }, 400);
            } else { playSound(200); showMsg(code); }
