<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V50 ULTRA - 工业级扫描增强版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; font-family: sans-serif; overflow: hidden; }
        .table-container { background: white; height: 52vh; overflow: auto; border: 2px solid #0f172a; border-radius: 12px; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; padding: 12px; font-size: 13px; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #eff6ff; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        
        /* 强化扫描 UI：增加辅助瞄准线 */
        #scanUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        .scan-area { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 180px; border: 2px solid rgba(255,255,255,0.5); border-radius: 15px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.7); z-index: 10; }
        .laser { position: absolute; width: 100%; height: 2px; background: #ef4444; top: 50%; box-shadow: 0 0 12px #ef4444; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #toast { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 15px 30px; border-radius: 50px; z-index: 10001; display: none; font-weight: 900; box-shadow: 0 10px 30px rgba(239,68,68,0.4); text-align: center; pointer-events: none; }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div class="flex flex-col h-screen">
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-2xl font-black italic">V50 <span class="text-blue-600">ULTRA SCAN</span></h1>
            <div class="flex gap-2">
                <button onclick="openColModal()" class="bg-slate-700 text-white px-3 py-2 rounded-lg text-xs font-bold">列管理</button>
                <button onclick="hardReset()" class="bg-red-500 text-white px-3 py-2 rounded-lg text-xs font-bold">清空</button>
            </div>
        </div>

        <div class="bg-white p-3 rounded-2xl shadow-lg flex items-center gap-3 border-2 border-slate-100 mb-3">
            <button onclick="startScanning()" class="w-24 h-24 bg-blue-600 rounded-full text-5xl shadow-xl flex items-center justify-center text-white active:scale-95 border-4 border-blue-200">📷</button>
            <div class="flex-1">
                <input type="text" id="manualInput" placeholder="输入条码..." class="w-full border-b-4 border-blue-100 p-2 text-xl font-bold outline-none mb-1 focus:border-blue-600" />
                <button onclick="handleManual()" class="w-full bg-slate-800 text-white py-2 rounded-lg font-bold text-sm">确认</button>
            </div>
        </div>

        <div class="table-container shadow-inner">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <div class="mt-4 space-y-2">
            <label class="block w-full bg-slate-100 text-slate-500 text-center py-4 rounded-xl font-bold text-sm border-2 border-dashed cursor-pointer">
                📂 导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <button onclick="exportExcel()" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl">💾 保存导出文件</button>
        </div>
    </div>

    <div id="scanUI">
        <div class="p-6 flex justify-between items-center text-white z-50">
            <div class="flex flex-col"><span class="text-blue-400 font-black">强力扫描模式</span><span class="text-[10px] text-gray-400">支持斜角、弱光识别</span></div>
            <button onclick="stopScanning()" class="bg-red-600 px-6 py-2 rounded-full font-black text-sm">退出</button>
        </div>
        <div class="relative flex-1">
            <video id="v" playsinline muted autoplay></video>
            <div class="scan-area">
                <div class="laser"></div>
                <div class="absolute -top-6 left-0 text-[10px] text-white bg-blue-600 px-2 py-0.5">请对准红线</div>
            </div>
        </div>
    </div>

    <div id="colModal" class="fixed inset-0 bg-black/80 z-[1000] hidden items-center justify-center">
        <div class="bg-white w-11/12 max-h-[80vh] rounded-3xl p-6 overflow-auto text-slate-900">
            <h2 class="text-xl font-black mb-4 border-b pb-2 italic">列管理</h2>
            <div id="colList" class="space-y-2 mb-4"></div>
            <div class="flex gap-2 p-2 bg-slate-100 rounded-xl mb-4 border border-slate-200">
                <input type="text" id="newColName" placeholder="新列名" class="flex-1 bg-transparent font-bold outline-none px-2" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black">确定并保存</button>
        </div>
    </div>

    <script>
        const VER = "V50_ULTRA_INDUSTRIAL_V5";
        let db = [], columns = [], widths = {}, lastCode = "", lastTime = 0, track = null;

        // 工业级配置：移除二维码干扰，开启高级降噪模式
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.CODE_128, 
            ZXing.BarcodeFormat.EAN_13, 
            ZXing.BarcodeFormat.CODE_39,
            ZXing.BarcodeFormat.UPC_A
        ]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true); // 开启强力模式
        hints.set(ZXing.DecodeHintType.CHARACTER_SET, 'utf-8');
        const zxing = new ZXing.BrowserMultiFormatReader(hints);

        function load() {
            try {
                db = JSON.parse(localStorage.getItem(VER+'_D')) || [];
                columns = JSON.parse(localStorage.getItem(VER+'_C')) || [];
                widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};
            } catch(e) {}
            if(columns.length) render();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2500);
        }

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            try {
                // 平衡分辨率：720P 既能保证超长条码精度，又不会拖慢 iOS 处理器
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } } 
                });
                const videoEl = document.getElementById('v');
                videoEl.srcObject = stream;
                track = stream.getVideoTracks()[0];

                // 核心：强制连续对焦与亮度控制（安卓支持度高）
                if (track && track.getCapabilities) {
                    const caps = track.getCapabilities();
                    const constraints = { advanced: [] };
                    if (caps.focusMode && caps.focusMode.includes('continuous')) constraints.advanced.push({ focusMode: 'continuous' });
                    if (caps.whiteBalanceMode && caps.whiteBalanceMode.includes('continuous')) constraints.advanced.push({ whiteBalanceMode: 'continuous' });
                    track.applyConstraints(constraints).catch(() => {});
                }

                // 启动解码
                zxing.decodeFromVideoElement(videoEl, (res) => {
                    if (res) {
                        const code = res.getText();
                        const now = Date.now();
                        // 1.5秒防重复触发
                        if (code === lastCode && (now - lastTime < 1500)) return;
                        lastCode = code; lastTime = now;
                        handleBarcode(code, true);
                    }
                });
            } catch (err) { alert("摄像头权限未开启或硬件冲突"); stopScanning(); }
        }

        function stopScanning() {
            zxing.reset();
            if(track) track.stop();
            document.getElementById('scanUI').style.display = 'none';
        }

        function handleBarcode(code, fromCam = false) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            const idx = db.findIndex(row => Object.values(row).some(v => v && String(v).trim().toLowerCase() === target));
            
            if (idx !== -1) {
                if(fromCam) stopScanning();
                render();
                setTimeout(() => {
                    const row = document.getElementById(`r-${idx}`);
                    const input = document.getElementById(`in-${idx}-实际数量`);
                    document.querySelectorAll('tr').forEach(t => t.classList.remove('row-focus'));
                    if (row) {
                        row.classList.add('row-focus');
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        if(input){ input.focus(); input.select(); }
                    }
                }, 200);
            } else {
                // 仅提示，绝不关闭摄像头或死机
                showToast("⚠️ 未入库条码: " + target);
            }
        }

        function handleManual() { handleBarcode(document.getElementById('manualInput').value); document.getElementById('manualInput').value = ''; }

        function render() {
            document.getElementById('tHead').innerHTML = `<tr>${columns.map(c => `<th style="width:${widths[c]||130}px">${c}</th>`).join('')}</tr>`;
            document.getElementById('tBody').innerHTML = db.map((row, rIdx) => `
                <tr id="r-${rIdx}">
                    ${columns.map(c => `<td><input id="in-${rIdx}-${c}" type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'p-2 w-full text-xs outline-none bg-transparent'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`).join('')}
                </tr>`).join('');
        }

        function saveVal(r, c, v) { db[r][c] = v; push(); }
        function push() { 
            localStorage.setItem(VER+'_D', JSON.stringify(db)); 
            localStorage.setItem(VER+'_C', JSON.stringify(columns)); 
            localStorage.setItem(VER+'_W', JSON.stringify(widths)); 
        }

        // 列管理（修复移动逻辑）
        function openColModal() { document.getElementById('colModal').style.display = 'flex'; renderColList(); }
        function closeColModal() { document.getElementById('colModal').style.display = 'none'; render(); }
        function renderColList() {
            document.getElementById('colList').innerHTML = columns.map((c, i) => `
                <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <span class="font-bold">${c}</span>
                    <div class="flex gap-2">
                        <button onclick="moveCol(${i},-1)" class="p-2 border rounded shadow-sm bg-white">⬆️</button>
                        <button onclick="moveCol(${i},1)" class="p-2 border rounded shadow-sm bg-white">⬇️</button>
                        <button onclick="deleteCol('${c}')" class="p-2 text-red-500 font-bold ml-2">删</button>
                    </div>
                </div>`).join('');
        }
        function moveCol(idx, dir) {
            let target = idx + dir;
            if (target >= 0 && target < columns.length) {
                const temp = columns[idx];
                columns[idx] = columns[target];
                columns[target] = temp;
                renderColList(); push(); 
            }
        }
        function addColumn() {
            const n = document.getElementById('newColName').value.trim();
            if (n && !columns.includes(n)) { columns.push(n); db.forEach(r => r[n] = ""); push(); renderColList(); }
            document.getElementById('newColName').value = '';
        }
        function deleteCol(n) { if(confirm("删除该列数据？")) { columns = columns.filter(c => c !== n); push(); renderColList(); } }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (json.length) {
                    columns = Object.keys(json[0]);
                    if (!columns.includes('实际数量')) columns.unshift('实际数量');
                    db = json; push(); render();
                }
            };
            reader.readAsArrayBuffer(file);
        };

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Inventory_${Date.now()}.xlsx`);
        }

        function hardReset() { if(confirm("彻底清空所有本地数据？")) { localStorage.clear(); location.reload(); } }
        load();
    </script>
</body>
</html>
