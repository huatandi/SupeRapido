<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V23 - 强制匹配版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; }
        .table-container { background: white; border: 2px solid #334155; height: 70vh; overflow: auto; border-radius: 12px; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 2px solid #475569; border-bottom: 4px solid #000; padding: 12px 8px; font-size: 14px; }
        td { border-right: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; padding: 2px; background: white; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; background: #fff; font-weight: 900; text-align: center; font-size: 2.2rem; color: #000; border-radius: 8px; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #2563eb; outline-offset: -6px; z-index: 10; }
        .scanner-overlay { position: absolute; inset: 0; border: 2px solid #22c55e; margin: 80px 25px; pointer-events: none; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); }
        .scanner-line { position: absolute; top: 50%; left: 0; width: 100%; height: 4px; background: #22c55e; box-shadow: 0 0 20px #22c55e; animation: scanMove 1.2s infinite ease-in-out; }
        @keyframes scanMove { 0% { top: 5%; } 100% { top: 95%; } }
        /* 报错信息加强，方便排查 */
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 25px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; font-size: 1.4rem; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6); min-width: 80%; }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>
    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-2xl font-black text-slate-900 italic">V23 <span class="text-xs font-normal">精准匹配版</span></h1>
            <button onclick="fullReset()" class="bg-red-600 text-white text-[10px] px-2 py-1 rounded font-bold">重置</button>
        </div>

        <div class="flex gap-1 mb-3 bg-white p-2 rounded-2xl shadow-lg border-2 border-slate-200">
            <button onclick="startScanning()" class="bg-blue-600 text-white w-16 h-16 flex items-center justify-center rounded-xl active:scale-90 shadow-lg">
                <span class="text-3xl">📷</span>
            </button>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="手动输条码..." class="flex-1 border-2 border-slate-200 rounded-xl px-3 font-black text-lg outline-none" />
                <button id="multiBtn" class="bg-slate-800 text-white px-4 rounded-xl font-black text-sm">确认/清空</button>
            </div>
            <label class="bg-slate-100 text-slate-600 w-12 h-16 flex items-center justify-center rounded-xl border border-slate-300">
                📂<input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
        </div>

        <div class="table-container shadow-xl">
            <table><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <button onclick="exportExcel()" class="mt-3 bg-emerald-600 text-white py-5 rounded-2xl font-black text-2xl shadow-2xl">💾 导出 EXCEL</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-6 flex justify-between items-center bg-slate-900 text-white border-b-2 border-green-500">
            <span class="font-black text-xl text-green-400">正在快速对焦...</span>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-3 rounded-full font-black text-lg">退出</button>
        </div>
        <div class="relative flex-1 bg-black overflow-hidden">
            <video id="v" class="w-full h-full object-cover"></video>
            <div class="scanner-overlay"><div class="scanner-line"></div></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('SR23_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem('SR23_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem('SR23_W')) || {};
        
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8, 
            ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A
        ]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

        const zxing = new ZXing.BrowserMultiFormatReader(hints);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type='sine') {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // 按钮交互
        const multiBtn = document.getElementById('multiBtn');
        const manualInput = document.getElementById('manualInput');
        let pressTimer;
        multiBtn.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => { manualInput.value = ''; showMsg("已清空", false); pressTimer = null; }, 600);
        });
        multiBtn.addEventListener('touchend', () => { if(pressTimer) { clearTimeout(pressTimer); handleBarcode(manualInput.value); pressTimer = null; } });

        function showMsg(txt, isErr=true) {
            const el = document.getElementById('toast'); 
            el.innerHTML = isErr ? `⚠️ 匹配失败<br><span style="font-size:1rem; font-weight:normal;">扫到内容: ${txt}</span>` : txt;
            el.style.display = 'block';
            el.style.background = isErr ? '#dc2626' : '#16a34a';
            setTimeout(() => el.style.display = 'none', 3000); // 错误留久点，方便看扫出了什么
        }

        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `<th id="th-${c}" style="width: ${widths[c] || 150}px"><div>${c}</div><div class="resizer" ontouchstart="doResize(event, '${c}')"></div></th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `<tr id="r-${rIdx}">${columns.map(c => `<td><input id="in-${rIdx}-${c}" type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'text-input'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`).join('')}</tr>`).join('');
        }

        // --- 核心改进：深度匹配逻辑 ---
        function handleBarcode(code) {
            if(!code) return;
            // 1. 强力清洗：去掉扫出来的空格
            const scanTarget = String(code).trim();
            
            // 2. 确定条码列
            const key = columns.find(x => /条码|码|COD|Barcode/i.test(x)) || columns[0];
            
            // 3. 强力匹配：循环每一行，强制转成字符串去掉空格再对比
            const i = db.findIndex(r => {
                const cellVal = String(r[key] || "").trim();
                return cellVal === scanTarget;
            });

            if (i !== -1) {
                playSound(1000); stopScanning(); render();
                const row = document.getElementById(`r-${i}`);
                const input = document.getElementById(`in-${i}-实际数量`);
                document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                row.classList.add('row-focus');
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => { input.focus(); input.select(); }, 400);
            } else { 
                playSound(200, 'triangle'); 
                showMsg(scanTarget); // 报错时直接显示扫出来的原数据，方便排查
            }
        }

        async function startScanning() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('scanUI').style.display = 'flex';
            const constraints = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } };
            zxing.decodeFromConstraints(constraints, 'v', (res) => { if (res) handleBarcode(res.getText()); });
        }
        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        function doResize(e, c) {
            const sX = e.touches[0].pageX; const sW = widths[c] || 150;
            const moving = (ev) => { widths[c] = Math.max(70, sW + (ev.touches[0].pageX - sX)); document.getElementById(`th-${c}`).style.width = widths[c] + 'px'; };
            const end = () => { document.removeEventListener('touchmove', moving); push(); };
            document.addEventListener('touchmove', moving, { passive: false });
            document.addEventListener('touchend', end, { once: true });
        }

        document.getElementById('fileInput').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, { type: 'string' }); // 核心：以字符串模式读取文件，防止长条码变科学计数法
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (json.length) { 
                    columns = Object.keys(json[0]); if (!columns.includes('实际数量')) columns.unshift('实际数量'); 
                    db = json; push(); render(); 
                }
            };
            r.readAsArrayBuffer(e.target.files[0]);
        };

        function saveVal(r, c, v) { db[r][c] = v; push(); }
        function push() { 
            localStorage.setItem('SR23_DATA', JSON.stringify(db)); 
            localStorage.setItem('SR23_COLS', JSON.stringify(columns));
            localStorage.setItem('SR23_W', JSON.stringify(widths));
        }
        function fullReset() { if(confirm("清除数据吗？")) { localStorage.clear(); location.reload(); } }
        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "Inventory_V23.xlsx");
        }
        manualInput.onkeydown = (e) => e.key === 'Enter' && handleBarcode(manualInput.value);
        if (columns.length) render();
    </script>
</body>
</html>
