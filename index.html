<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V9 - 最终自愈版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; -webkit-overflow-scrolling: touch; }
        .table-container { background: white; border: 1px solid #cbd5e1; height: 75vh; overflow: auto; border-radius: 12px; }
        th { position: sticky; top: 0; z-index: 40; background: #f8fafc; border-bottom: 2px solid #cbd5e1; padding: 12px; min-width: 120px; }
        td { border-bottom: 1px solid #e2e8f0; padding: 4px; }
        .qty-input { width: 100%; height: 50px; border: 3px solid #2563eb !important; background: #eff6ff !important; font-weight: 900; text-align: center; font-size: 1.5rem; border-radius: 8px; }
        .row-blink { background-color: #fef08a !important; transition: background 0.3s; }
    </style>
</head>
<body class="p-2">
    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-black text-blue-900 italic">SuperRapido V9</h1>
            <button onclick="clearEverything()" class="text-[10px] text-red-500 font-bold border border-red-200 px-2 py-1 rounded bg-white">点此重置系统</button>
        </div>
        <div class="flex gap-2 mb-3 bg-white p-2 rounded-2xl shadow-md border">
            <label class="bg-slate-900 text-white w-14 h-14 flex items-center justify-center rounded-xl active:scale-90">
                📂 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="手动输条码..." class="flex-1 border-2 border-slate-100 rounded-xl px-3 font-bold outline-none focus:border-blue-500" />
                <button onclick="startScan()" class="bg-blue-600 text-white px-5 rounded-xl font-black shadow-lg">📷 扫码</button>
            </div>
        </div>
        <div class="table-container shadow-2xl">
            <table class="table-fixed w-max text-sm text-slate-700">
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
        <button onclick="exportExcel()" class="mt-3 bg-emerald-700 text-white py-5 rounded-2xl font-black text-xl shadow-2xl active:bg-emerald-800">
            💾 保存导出 EXCEL 盘点表
        </button>
    </div>
    <div id="scanModal" class="fixed inset-0 bg-black z-[1000] hidden flex-col">
        <div class="p-6 flex justify-between items-center text-white">
            <span class="font-bold">连续扫码中...</span>
            <button onclick="stopScan()" class="bg-red-600 px-8 py-3 rounded-full font-black">退出</button>
        </div>
        <video id="v" class="flex-1 object-cover"></video>
    </div>
    <script>
        let data = JSON.parse(localStorage.getItem('SR9_DATA')) || [];
        let cols = JSON.parse(localStorage.getItem('SR9_COLS')) || [];
        const codeReader = new ZXing.BrowserMultiFormatReader();

        function render() {
            const head = document.getElementById('tHead'); const body = document.getElementById('tBody');
            if (!cols.length) return;
            head.innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
            body.innerHTML = data.map((row, rIdx) => `<tr id="r-${rIdx}">${cols.map(c => `<td><input type="${c==='实际数量'?'number':'text'}" id="i-${rIdx}-${c}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'w-full h-10 px-2 outline-none bg-transparent'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`).join('')}</tr>`).join('');
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0]; const reader = new FileReader();
            reader.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (json.length > 0) {
                    cols = Object.keys(json[0]);
                    if (!cols.includes('实际数量')) cols.unshift('实际数量');
                    data = json; save(); render(); alert("成功！加载 " + json.length + " 行。");
                }
            };
            reader.readAsArrayBuffer(file);
        };

        function processCode(code) {
            const k = cols.find(c => /条码|码|COD|Barcode/i.test(c)) || cols[0];
            const idx = data.findIndex(r => String(r[k]).trim() === String(code).trim());
            if (idx !== -1) {
                data[idx]['实际数量'] = (parseFloat(data[idx]['实际数量']) || 0) + 1;
                save(); render();
                const row = document.getElementById(`r-${idx}`);
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                row.classList.add('row-blink'); setTimeout(() => row.classList.remove('row-blink'), 2000);
            } else { alert("未找到条码: " + code); }
        }

        async function startScan() {
            document.getElementById('scanModal').style.display = 'flex';
            codeReader.decodeFromConstraints({ video: { facingMode: "environment" } }, 'v', (res) => { if (res) { processCode(res.getText()); } });
        }

        function stopScan() { codeReader.reset(); document.getElementById('scanModal').style.display = 'none'; }
        function saveVal(r, c, v) { data[r][c] = v; save(); }
        function save() { localStorage.setItem('SR9_DATA', JSON.stringify(data)); localStorage.setItem('SR9_COLS', JSON.stringify(cols)); }
        function clearEverything() { if(confirm("确定清空？")) { localStorage.clear(); location.reload(); } }
        function exportExcel() { const ws = XLSX.utils.json_to_sheet(data, { header: cols }); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1"); XLSX.writeFile(wb, "Stock_V9.xlsx"); }
        document.getElementById('manualInput').onkeydown = (e) => e.key === 'Enter' && processCode(e.target.value);
        if (cols.length) render();
    </script>
</body>
</html>
