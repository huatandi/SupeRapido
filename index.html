<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V15 - 撤销功能版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; }
        .table-container { background: white; border: 2px solid #334155; height: 72vh; overflow: auto; border-radius: 12px; position: relative; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 2px solid #475569; border-bottom: 4px solid #000; padding: 8px; font-size: 13px; text-align: center; }
        .resizer { position: absolute; right: 0; top: 0; width: 15px; height: 100%; cursor: col-resize; z-index: 60; touch-action: none; border-right: 4px solid #22c55e; }
        td { border-right: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; padding: 2px; background: white; }
        .qty-input { width: 100%; height: 55px; border: 3px solid #2563eb !important; background: #f0f9ff; font-weight: 900; text-align: center; font-size: 1.8rem; color: #1e40af; border-radius: 8px; }
        .text-input { width: 100%; min-height: 40px; border: none; padding: 4px; background: transparent; font-size: 14px; outline: none; }
        .row-blink { background-color: #fef08a !important; transition: background 0.2s; }
        #toast { position: fixed; top: 25%; left: 50%; transform: translateX(-50%); color: white; padding: 16px 32px; border-radius: 12px; z-index: 10000; display: none; font-weight: bold; font-size: 1.2rem; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>
    <div class="flex flex-col h-screen">
        <div class="flex justify-between items-center mb-2">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-black text-slate-900 italic underline decoration-blue-500">V15</h1>
                <div class="flex gap-1">
                    <button onclick="undo()" class="bg-white border-2 border-slate-300 px-3 py-1 rounded shadow active:bg-slate-200">↩️</button>
                    <button onclick="redo()" class="bg-white border-2 border-slate-300 px-3 py-1 rounded shadow active:bg-slate-200">↪️</button>
                </div>
            </div>
            <button onclick="fullReset()" class="bg-red-600 text-white text-[10px] px-2 py-1 rounded-md font-bold uppercase">重置</button>
        </div>

        <div class="flex gap-2 mb-3 bg-white p-2 rounded-2xl shadow-lg border-2 border-slate-200">
            <label class="bg-slate-900 text-white w-14 h-14 flex items-center justify-center rounded-xl active:scale-95 transition-all">
                📂 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <div class="flex-1 flex gap-1">
                <input type="text" id="manualInput" placeholder="输入条码/名称..." class="flex-1 border-2 border-slate-200 rounded-xl px-3 font-bold outline-none" />
                <button onclick="startScanning()" class="bg-blue-600 text-white px-6 rounded-xl font-black shadow-lg">📷 扫码</button>
            </div>
        </div>

        <div class="table-container shadow-2xl">
            <table>
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <button onclick="exportExcel()" class="mt-3 bg-emerald-700 text-white py-5 rounded-2xl font-black text-xl shadow-2xl active:bg-emerald-900">
            💾 保存导出 EXCEL 结果
        </button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white">
            <span class="font-bold tracking-widest text-green-400">连续扫描中</span>
            <button onclick="stopScanning()" class="bg-red-600 px-10 py-3 rounded-full font-black text-lg">退出</button>
        </div>
        <div class="relative flex-1"><video id="v" class="w-full h-full object-cover"></video></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('SR15_DATA')) || [];
        let columns = JSON.parse(localStorage.getItem('SR15_COLS')) || [];
        let widths = JSON.parse(localStorage.getItem('SR15_W')) || {};
        let swapCol = null;
        const zxing = new ZXing.BrowserMultiFormatReader();

        // 历史记录系统
        let history = [];
        let historyStep = -1;

        function record() {
            if (historyStep < history.length - 1) history = history.slice(0, historyStep + 1);
            history.push(JSON.stringify({ db, columns }));
            if (history.length > 30) history.shift();
            historyStep = history.length - 1;
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                const state = JSON.parse(history[historyStep]);
                db = state.db; columns = state.columns;
                push(false); render(); showMsg("已撤销", false);
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                const state = JSON.parse(history[historyStep]);
                db = state.db; columns = state.columns;
                push(false); render(); showMsg("已重做", false);
            }
        }

        function showMsg(txt, isErr=true) {
            const el = document.getElementById('toast');
            el.innerText = txt; el.style.display = 'block';
            el.style.background = isErr ? '#dc2626' : '#16a34a';
            setTimeout(() => el.style.display = 'none', 1000);
        }

        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `<th id="th-${c}" style="width: ${widths[c] || 150}px"><div class="flex flex-col gap-2"><span>${c}</span><button onclick="swap('${c}')" class="text-[10px] bg-blue-500 py-1 rounded-md border border-white/20">↔️换位</button></div><div class="resizer" ontouchstart="doResize(event, '${c}')"></div></th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `<tr id="r-${rIdx}">${columns.map(c => `<td><input type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'text-input'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`).join('')}</tr>`).join('');
        }

        function swap(c) {
            if (!swapCol) { swapCol = c; showMsg("点另一列换位", false); } 
            else {
                const a = columns.indexOf(swapCol); const b = columns.indexOf(c);
                [columns[a], columns[b]] = [columns[b], columns[a]];
                swapCol = null; record(); push(); render();
            }
        }

        function doResize(e, c) {
            const sX = e.touches[0].pageX; const sW = widths[c] || 150;
            const moving = (ev) => { widths[c] = Math.max(70, sW + (ev.touches[0].pageX - sX)); document.getElementById(`th-${c}`).style.width = widths[c] + 'px'; };
            const end = () => { document.removeEventListener('touchmove', moving); push(); };
            document.addEventListener('touchmove', moving, { passive: false });
            document.addEventListener('touchend', end, { once: true });
        }

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            zxing.decodeFromConstraints({ video: { facingMode: "environment" } }, 'v', (res) => { if (res) { handleBarcode(res.getText()); if(navigator.vibrate) navigator.vibrate(50); } });
        }
        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        function handleBarcode(code) {
            const key = columns.find(x => /条码|码|COD|Barcode/i.test(x)) || columns[0];
            const i = db.findIndex(r => String(r[key]).trim() === String(code).trim());
            if (i !== -1) {
                db[i]['实际数量'] = (parseFloat(db[i]['实际数量']) || 0) + 1;
                record(); push(); render();
                document.getElementById(`r-${i}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else { showMsg("未匹配: " + code); }
        }

        document.getElementById('fileInput').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const wb = XLSX.read(ev.target.result, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (json.length) {
                    columns = Object.keys(json[0]); if (!columns.includes('实际数量')) columns.unshift('实际数量');
                    db = json; record(); push(); render(); showMsg("导入成功", false);
                }
            };
            r.readAsArrayBuffer(e.target.files[0]);
        };

        function saveVal(r, c, v) { db[r][c] = v; record(); push(); }
        function push(rec = true) { 
            localStorage.setItem('SR15_DATA', JSON.stringify(db)); 
            localStorage.setItem('SR15_COLS', JSON.stringify(columns));
            localStorage.setItem('SR15_W', JSON.stringify(widths));
        }
        function fullReset() { if(confirm("重置吗？")) { localStorage.clear(); location.reload(); } }
        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "Inventory_V15.xlsx");
        }
        document.getElementById('manualInput').onkeydown = (e) => e.key === 'Enter' && handleBarcode(e.target.value);
        if (columns.length) { render(); record(); }
    </script>
</body>
</html>
