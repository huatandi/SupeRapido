<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>V50 PRO - TEST DRIVE</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .table-container { background: white; border: 2px solid #1e293b; height: 55vh; overflow: auto; border-radius: 12px; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; -webkit-appearance: none; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        #colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .scan-frame { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 220px; border: 3px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #3b82f6; top: 0; animation: scanLineMove 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px #3b82f6; will-change: top; }
        @keyframes scanLineMove { 0% { top: 5%; } 50% { top: 95%; } 100% { top: 5%; } }
        .giant-cam-btn { width: 100px !important; height: 100px !important; font-size: 50px !important; flex-shrink: 0; box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); border: 4px solid white; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-2">
    <div id="mainApp">
        <div id="colModal">
            <div class="bg-white w-11/12 max-h-[85vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl">
                <h2 class="text-2xl font-black mb-4 border-b-2 pb-2 text-center text-slate-800 italic">列管理 / COLUMNAS</h2>
                <div class="flex gap-2 p-3 bg-blue-50 rounded-2xl border-2 border-blue-100 mb-2">
                    <input type="text" id="newColNameTop" placeholder="新列名..." class="flex-1 bg-transparent font-bold outline-none text-lg" />
                    <button onclick="addColumnAt(-1)" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm">加至末尾</button>
                </div>
                <div id="colList" class="space-y-0 mt-4"></div>
                <button onclick="closeColModal()" class="w-full mt-6 bg-slate-900 text-white py-5 rounded-2xl font-black text-xl shadow-xl">保存并返回</button>
            </div>
        </div>

        <div class="flex flex-col h-screen">
            <div class="flex items-center justify-between mb-3 px-1">
                <div class="flex flex-col">
                    <h1 class="text-3xl font-black text-slate-900 italic leading-none">V50 PRO</h1>
                    <span class="text-[10px] font-bold text-orange-600 uppercase">Test Version / 无限制版</span>
                </div>
                <div class="flex flex-1 justify-end gap-3 ml-4">
                    <button onclick="openColModal()" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-black text-xs shadow-md">列管理</button>
                    <button onclick="hardReset()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black text-xs shadow-md">重置</button>
                </div>
            </div>

            <div class="flex gap-3 mb-4 bg-white p-3 rounded-3xl shadow-xl border-2 border-slate-100 items-center">
                <button onclick="startScanning()" class="bg-blue-600 text-white rounded-3xl active:scale-95 giant-cam-btn">📷</button>
                <div class="flex-1 flex flex-col gap-2">
                    <div class="flex flex-col gap-1">
                        <input type="text" id="manualInput" placeholder="输入条码..." class="w-full border-4 border-blue-50 border-b-blue-200 rounded-xl px-4 h-12 font-bold outline-none focus:border-blue-600 text-lg" />
                        <button id="confirmBtn" class="w-full bg-blue-700 text-white py-3 rounded-xl font-black text-lg shadow-lg">确认 / OK</button>
                    </div>
                    <label class="bg-slate-50 text-slate-400 h-10 flex items-center justify-center rounded-xl border-2 border-dashed border-slate-200 text-[10px] font-black">
                        📂 导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
                    </label>
                </div>
            </div>

            <div class="table-container">
                <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
            </div>
            
            <button onclick="exportExcel()" class="mt-4 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl shadow-xl border-b-8 border-emerald-900">💾 导出 EXCEL</button>
        </div>

        <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
            <div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b-2 border-blue-500">
                <span class="font-bold text-blue-400">正在扫描...</span>
                <button onclick="stopScanning()" class="bg-red-600 px-10 py-3 rounded-full font-black">退出</button>
            </div>
            <div class="relative flex-1 overflow-hidden bg-black">
                <video id="v" class="w-full h-full object-cover" playsinline muted></video>
                <div class="scan-frame"><div class="scan-line"></div></div>
            </div>
        </div>
    </div>

    <script>
        const VER = "SR_V50_TEST_DRIVE"; // 使用独立的测试存储键
        let db = []; let columns = []; let widths = {};
        let lastScannedCode = ""; let lastScannedTime = 0;

        // 初始化数据加载
        try {
            db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
            columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
            widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};
        } catch(e) { console.error("Data Load Error", e); }

        const hints = new Map();
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true); 
        const zxing = new ZXing.BrowserMultiFormatReader(hints);
        zxing.timeBetweenDecodingAttempts = 50;

        document.getElementById('confirmBtn').onclick = () => handleBarcode(document.getElementById('manualInput').value);

        function playSound(isSuccess) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(isSuccess ? 1000 : 250, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } catch(e) {}
        }

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            try {
                const constraints = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } } };
                zxing.decodeFromConstraints(constraints, 'v', (res) => {
                    if (res) {
                        const code = res.getText();
                        const now = Date.now();
                        if (code === lastScannedCode && (now - lastScannedTime < 1500)) return;
                        lastScannedCode = code; lastScannedTime = now;
                        handleBarcode(code, true);
                    }
                });
            } catch (err) { alert("相机启动失败"); stopScanning(); }
        }

        function stopScanning() { zxing.reset(); document.getElementById('scanUI').style.display = 'none'; }

        function handleBarcode(code, fromCam = false) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            document.getElementById('manualInput').value = '';
            const idx = db.findIndex(row => Object.values(row).some(v => v !== null && String(v).trim().toLowerCase() === target));
            if (idx !== -1) {
                playSound(true); render();
                const rowEl = document.getElementById(`r-${idx}`);
                const inputEl = document.getElementById(`in-${idx}-实际数量`);
                document.querySelectorAll('tr').forEach(tr => tr.classList.remove('row-focus'));
                if (rowEl) {
                    rowEl.classList.add('row-focus');
                    rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setTimeout(() => { if(inputEl){inputEl.focus(); inputEl.select();} }, 400);
                }
                if(fromCam) stopScanning();
            } else {
                playSound(false); alert("未找到: " + target);
            }
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                if (json.length) {
                    columns = Object.keys(json[0]);
                    if (!columns.includes('实际数量')) columns.unshift('实际数量');
                    db = json; push(); render(); 
                }
            };
            r.readAsArrayBuffer(file);
        };

        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            if (!columns.length) return;
            h.innerHTML = `<tr>${columns.map(c => `<th id="th-${c}" style="width: ${widths[c] || 130}px">${c}<div class="resizer" ontouchstart="initResize(event, '${c}')"></div></th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => {
                const cells = columns.map(c => {
                    const isQty = (c === '实际数量');
                    return `<td><input id="in-${rIdx}-${c}" type="${isQty?'number':'text'}" value="${row[c]||''}" class="${isQty?'qty-input':'p-2 w-full text-[13px] outline-none bg-transparent'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`;
                }).join('');
                return `<tr id="r-${rIdx}">${cells}</tr>`;
            }).join('');
        }

        function saveVal(r, c, v) { db[r][c] = v; push(); }
        function push() { 
            localStorage.setItem(VER+'_DATA', JSON.stringify(db)); 
            localStorage.setItem(VER+'_COLS', JSON.stringify(columns)); 
            localStorage.setItem(VER+'_W', JSON.stringify(widths)); 
        }

        function openColModal() { document.getElementById('colModal').style.display = 'flex'; renderColList(); }
        function closeColModal() { document.getElementById('colModal').style.display = 'none'; render(); }

        function renderColList() {
            const listEl = document.getElementById('colList');
            let html = "";
            columns.forEach((c, i) => {
                html += `
                    <div class="flex items-center justify-center py-1">
                        <button onclick="askNewColAt(${i})" class="bg-emerald-500 text-white w-7 h-7 rounded-full shadow-sm text-lg font-black">+</button>
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border-2 border-slate-200">
                        <span class="font-bold text-slate-700 truncate mr-2 flex-1">${c}</span>
                        <div class="flex gap-1">
                            <button onclick="moveCol(${i},-1)" class="px-2 py-1 bg-white border rounded text-xs ${i===0?'opacity-20':''}">↑</button>
                            <button onclick="moveCol(${i},1)" class="px-2 py-1 bg-white border rounded text-xs ${i===columns.length-1?'opacity-20':''}">↓</button>
                            <button onclick="deleteCol('${c}')" class="px-2 py-1 bg-red-50 text-red-600 rounded text-xs font-bold border border-red-100">删</button>
                        </div>
                    </div>`;
            });
            listEl.innerHTML = html;
        }

        function askNewColAt(index) {
            const name = prompt("请输入新列名:");
            if (name) addColumnAt(index, name);
        }

        function addColumnAt(index, name = "") {
            const val = name || document.getElementById('newColNameTop').value.trim();
            if (val && !columns.includes(val)) {
                if (index === -1) columns.push(val);
                else columns.splice(index, 0, val);
                db.forEach(r => r[val] = "");
                document.getElementById('newColNameTop').value = "";
                push(); renderColList();
            }
        }

        function moveCol(i, d) {
            let t = i + d;
            if (t >= 0 && t < columns.length) {
                [columns[i], columns[t]] = [columns[t], columns[i]];
                push(); renderColList();
            }
        }

        function deleteCol(n) {
            if(confirm(`确定删除 [${n}] 吗？`)) {
                columns = columns.filter(c => c !== n);
                push(); renderColList();
            }
        }

        function initResize(e, c) {
            const sX = e.touches[0].pageX; const sW = widths[c] || 130;
            const onM = (ev) => { widths[c] = Math.max(50, sW + (ev.touches[0].pageX - sX)); render(); };
            document.addEventListener('touchmove', onM);
            document.addEventListener('touchend', () => { document.removeEventListener('touchmove', onM); push(); }, {once:true});
        }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_V50_TEST_${new Date().toLocaleDateString()}.xlsx`);
        }

        function hardReset() { if(confirm("确定清空全部数据吗？")) { localStorage.clear(); location.reload(); } }
