<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SuperRapido V48</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .box { background: white; border: 1px solid #ddd; border-radius: 8px; margin: 5px; padding: 10px; }
        .table-wrap { flex: 1; overflow: auto; margin: 5px; border: 2px solid #334155; background: white; border-radius: 8px; }
        table { border-collapse: collapse; width: max-content; }
        th { position: sticky; top: 0; background: #1e293b; color: white; padding: 10px; font-size: 12px; z-index: 10; }
        td { border: 1px solid #e2e8f0; padding: 0; }
        .qty { width: 100%; height: 50px; border: 3px solid #2563eb !important; text-align: center; font-size: 24px; font-weight: 900; color: #1e40af; outline: none; }
        .row-sel { background: #fef08a !important; border: 4px solid #ef4444 !important; }
        #scanUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #v { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="box flex items-center gap-2">
        <button onclick="startScan()" class="bg-blue-600 text-white w-14 h-14 rounded-xl text-2xl shadow-lg active:scale-90">📷</button>
        <div class="flex-1 flex flex-col gap-1">
            <div class="flex gap-1">
                <input type="text" id="mIn" placeholder="扫码/输入..." class="flex-1 border-2 border-slate-300 rounded px-2 h-9 font-bold outline-none" />
                <button onclick="checkCode(mIn.value)" class="bg-slate-800 text-white px-4 rounded font-bold h-9">确认</button>
            </div>
            <label class="bg-slate-100 text-slate-600 h-7 flex items-center justify-center rounded border border-dashed border-slate-400 text-[10px] font-bold">
                📂 导入 EXCEL <input type="file" id="fIn" class="hidden" accept=".xlsx, .xls" />
            </label>
        </div>
        <button onclick="if(confirm('清空？')) {localStorage.clear(); location.reload();}" class="bg-red-500 text-white px-2 py-1 rounded text-[10px] font-bold">重置</button>
    </div>

    <div class="table-wrap">
        <table id="tbl"><thead id="th"></thead><tbody id="tb"></tbody></table>
    </div>

    <button onclick="doExport()" class="m-2 bg-emerald-700 text-white py-4 rounded-xl font-black text-lg shadow-lg">💾 保存导出 Excel</button>

    <div id="scanUI">
        <div class="p-4 flex justify-between bg-slate-900 text-white font-bold">
            <span>正在扫描...</span>
            <button onclick="stopScan()" class="bg-red-600 px-6 py-1 rounded-full">返回</button>
        </div>
        <video id="v" playsinline muted autoplay></video>
    </div>

    <script>
        const STORE = "SR_V48_STORAGE";
        let db = JSON.parse(localStorage.getItem(STORE)) || [];
        let cols = JSON.parse(localStorage.getItem(STORE+'_C')) || [];
        const z = new ZXing.BrowserMultiFormatReader();

        // 文件导入 - 极简逻辑防止死机
        document.getElementById('fIn').onchange = (e) => {
            const f = e.target.files[0];
            if(!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const b = new Uint8Array(ev.target.result);
                const w = XLSX.read(b, {type:'array'});
                const j = XLSX.utils.sheet_to_json(w.Sheets[w.SheetNames[0]], {defval:""});
                if(j.length > 0) {
                    cols = Object.keys(j[0]);
                    if(!cols.includes('实际数量')) cols.unshift('实际数量');
                    db = j; save(); render();
                }
            };
            r.readAsArrayBuffer(f);
        };

        async function startScan() {
            document.getElementById('scanUI').style.display = 'flex';
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                const ve = document.getElementById('v');
                ve.srcObject = s;
                ve.onloadedmetadata = () => {
                    ve.play();
                    z.decodeFromStream(s, 'v', (res) => {
                        if(res) { checkCode(res.getText()); stopScan(); }
                    });
                };
            } catch(e) { alert("摄像头打不开，请检查设置"); stopScan(); }
        }

        function stopScan() {
            z.reset();
            const ve = document.getElementById('v');
            if(ve.srcObject) ve.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('scanUI').style.display = 'none';
        }

        function checkCode(c) {
            if(!c) return;
            const t = String(c).trim().toLowerCase();
            const i = db.findIndex(r => Object.values(r).some(v => String(v).toLowerCase() === t));
            if(i !== -1) {
                render();
                const rEl = document.getElementById('r-'+i);
                const iEl = document.getElementById('i-'+i);
                rEl.scrollIntoView({behavior:'smooth', block:'center'});
                rEl.classList.add('row-sel');
                setTimeout(() => { iEl.focus(); iEl.select(); }, 400);
            } else { alert("未找到: " + c); }
            mIn.value = "";
        }

        function render() {
            if(!cols.length) return;
            document.getElementById('th').innerHTML = `<tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr>`;
            document.getElementById('tb').innerHTML = db.map((r, i) => `
                <tr id="r-${i}">
                    ${cols.map(c => `<td><input id="${c==='实际数量'?'i-'+i:''}" type="${c==='实际数量'?'number':'text'}" 
                        class="${c==='实际数量'?'qty':'p-2 w-full text-xs outline-none'}" 
                        value="${r[c]||''}" onchange="db[${i}]['${c}']=this.value;save();" /></td>`).join('')}
                </tr>`).join('');
        }

        function save() { 
            localStorage.setItem(STORE, JSON.stringify(db)); 
            localStorage.setItem(STORE+'_C', JSON.stringify(cols));
        }

        function doExport() {
            const ws = XLSX.utils.json_to_sheet(db, {header:cols});
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_${new Date().getTime()}.xlsx`);
        }

        if(cols.length) render();
        mIn.onkeydown = (e) => { if(e.key==='Enter') checkCode(mIn.value); };
    </script>
</body>
</html>
