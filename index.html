<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>飞速盘点 S1.9 - SupeRapido</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
        }
        .main-card {
            background: white;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .header-fixed {
            flex-shrink: 0;
            background: white;
            z-index: 20;
        }
        /* 底部按钮 - 使用 transform 实现动态上移 */
        .bottom-fixed-btns {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 12px 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 100;
            border-top: 1px solid #e2e8f0;
            transition: bottom 0.3s ease-out;
        }
        /* 键盘弹出时按钮上移到键盘上方 */
        .keyboard-open .bottom-fixed-btns {
            bottom: 320px;
        }
        /* iPad 大屏幕适配 */
        @media (min-width: 768px) and (max-width: 1024px) {
            .keyboard-open .bottom-fixed-btns {
                bottom: 350px;
            }
        }
        /* iPad Pro 12.9寸 */
        @media (min-width: 1024px) and (min-height: 1366px) {
            .keyboard-open .bottom-fixed-btns {
                bottom: 400px;
            }
        }
        .scrollable-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 0 16px 16px 16px;
        }
        .table-container { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            overflow-x: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }
        table { 
            border-collapse: collapse; 
            width: 100%;
            min-width: 100%;
            table-layout: auto;
        }
        th { 
            position: sticky; 
            top: 0; 
            z-index: 50; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; 
            border: 1px solid #334155; 
            padding: 12px; 
            font-size: 13px; 
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
        }
        td { 
            border: 1px solid #e2e8f0; 
            padding: 8px;
            white-space: nowrap;
        }
        .qty-input { 
            width: 100%;
            min-width: 80px;
            max-width: 120px;
            height: 50px; 
            border: 3px solid #3b82f6 !important; 
            text-align: center; 
            font-size: 1.3rem; 
            font-weight: 900; 
            color: #1e40af; 
            border-radius: 10px; 
            background: #f0f9ff; 
            transition: all 0.2s;
        }
        .qty-input:focus {
            background: #fef9c3;
            transform: scale(1.02);
            border-color: #ef4444 !important;
            outline: none;
        }
        .row-focus { 
            background: linear-gradient(90deg, #fef08a 0%, #fde047 100%) !important;
        }
        #toast { 
            position: fixed; 
            top: 20%; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #1f2937;
            color: white; 
            padding: 10px 20px; 
            border-radius: 40px; 
            z-index: 10000; 
            display: none; 
            font-weight: bold; 
            text-align: center; 
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            pointer-events: none;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        #colModal { 
            display:none; 
            position:fixed; 
            inset:0; 
            background:rgba(0,0,0,0.9); 
            z-index:9999; 
            align-items:center; 
            justify-content:center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 90%;
            width: 350px;
            max-height: 70vh;
            overflow: auto;
        }
        .scan-frame { 
            position: absolute; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 80%; 
            height: 220px; 
            border: 3px solid #3b82f6; 
            border-radius: 20px; 
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.75); 
            z-index: 10; 
            pointer-events: none; 
            background: rgba(0,0,0,0.1);
        }
        .scan-line { 
            position: absolute; 
            width: 100%; 
            height: 4px; 
            background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, #3b82f6, transparent);
            top: 0; 
            animation: scanLineMove 1.2s infinite ease-in-out; 
            box-shadow: 0 0 20px #3b82f6;
        }
        @keyframes scanLineMove { 
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }
        .col-item {
            background: white;
            margin-bottom: 8px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: move;
            touch-action: none;
        }
        .col-item.dragging {
            opacity: 0.4;
            transform: scale(0.98);
            background: #dbeafe;
        }
        .version-badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: bold;
        }
        .btn-group-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 16px 0;
        }
        .action-btn {
            padding: 12px 4px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
            transition: all 0.1s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .bottom-btns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .bottom-btn {
            padding: 14px 4px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            transition: all 0.1s;
            cursor: pointer;
        }
        .cam-btn-large {
            background: #3b82f6;
            color: white;
            font-size: 28px;
        }
        .close-scan-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
            font-size: 18px;
            font-weight: 900;
            padding: 12px 24px;
            border-radius: 50px;
            border: 2px solid white;
            cursor: pointer;
        }
        .close-scan-btn:active, .action-btn:active, .bottom-btn:active {
            transform: scale(0.97);
        }
        .scan-header {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            border-bottom: 3px solid #3b82f6;
        }
        .scan-success {
            animation: flash 0.2s ease;
        }
        @keyframes flash {
            0%, 100% { border-color: #3b82f6; }
            50% { border-color: #10b981; box-shadow: 0 0 0 2000px rgba(16,185,129,0.3); }
        }
        #manualInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            outline: none;
        }
        #manualInput:focus {
            border-color: #3b82f6;
        }
        @media (max-width: 640px) {
            .action-btn { font-size: 10px; padding: 10px 2px; }
            .bottom-btn { font-size: 14px; padding: 12px 4px; }
            .qty-input { height: 45px; font-size: 1.1rem; min-width: 70px; }
            .cam-btn-large { font-size: 24px; }
            .bottom-fixed-btns { padding: 8px 12px; }
            .scrollable-area { padding: 0 12px 16px 12px; }
            .keyboard-open .bottom-fixed-btns {
                bottom: 260px;
            }
        }
        /* 滚动区域在键盘弹出时增加内边距 */
        .keyboard-open .scrollable-area {
            padding-bottom: 100px;
        }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="colModal">
        <div class="modal-content p-5">
            <h2 class="text-xl font-bold mb-3 text-center">📋 列管理</h2>
            <p class="text-xs text-gray-500 text-center mb-3">💡 拖动排序 | 点击按钮删除</p>
            <div id="colList" class="space-y-2 mb-4 max-h-80 overflow-auto"></div>
            <div class="flex gap-2 p-2 bg-gray-100 rounded-lg">
                <input type="text" id="newColName" placeholder="新列名..." class="flex-1 bg-white rounded-lg px-3 py-2 font-bold text-sm outline-none" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-4 bg-gray-900 text-white py-3 rounded-xl font-bold text-base">完成</button>
        </div>
    </div>

    <div class="main-card">
        <div class="header-fixed">
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 text-white">
                <div class="flex items-center justify-center gap-3">
                    <span class="text-2xl">⚡</span>
                    <h1 class="text-2xl font-black tracking-tight">飞速盘点</h1>
                    <div class="version-badge">S1.9</div>
                </div>
            </div>
            
            <div style="padding: 16px 16px 0 16px;">
                <input type="text" id="manualInput" placeholder="📱 输入条码/编码/名称..." />
                
                <div class="btn-group-4">
                    <button onclick="openColModal()" class="action-btn bg-gray-700 text-white shadow-md">
                        📊 列管理
                    </button>
                    <label class="action-btn bg-emerald-600 text-white shadow-md cursor-pointer">
                        📂 导入 <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
                    </label>
                    <button onclick="exportExcel()" class="action-btn bg-emerald-600 text-white shadow-md">
                        💾 导出
                    </button>
                    <button id="confirmBtn" class="action-btn bg-blue-600 text-white shadow-md">
                        ✅ 确认
                    </button>
                </div>
            </div>
        </div>

        <div class="scrollable-area">
            <div class="table-container">
                <table id="mainTable">
                    <thead id="tHead"></thead>
                    <tbody id="tBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 底部固定按钮 - 键盘弹出时自动上移 -->
    <div class="bottom-fixed-btns">
        <div class="bottom-btns">
            <button id="scanBtn" class="bottom-btn bg-blue-600 text-white shadow-lg cam-btn-large">
                📷 扫码
            </button>
            <button onclick="hardReset()" class="bottom-btn bg-red-600 text-white shadow-lg">
                🗑️ 重置
            </button>
        </div>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="scan-header p-4 flex justify-between items-center">
            <span class="font-bold text-blue-400 text-lg">🔍 SupeRapido</span>
            <button onclick="stopScanning(true)" class="close-scan-btn text-white font-bold">
                ✕ 关闭扫描
            </button>
        </div>
        <div class="relative flex-1 bg-black">
            <video id="video" class="w-full h-full object-cover" playsinline muted autoplay></video>
            <div class="scan-frame" id="scanFrame">
                <div class="scan-line"></div>
            </div>
            <div class="absolute bottom-8 left-0 right-0 text-center">
                <div class="bg-black/70 backdrop-blur text-white px-4 py-2 rounded-full inline-block text-sm font-bold border-2 border-blue-500">
                    📷 将条码对准扫描框
                </div>
            </div>
        </div>
    </div>

    <script>
        const VERSION = "S1.9";
        const STORAGE_KEY = "FEISUPANDIAN_" + VERSION;
        
        let db = [];
        let columns = [];
        let scanning = false;
        let reader = null;
        let lastCode = "";
        let lastTime = 0;
        let currentFocusInterval = null;
        let pendingJump = null;
        let currentInputElement = null;
        let originalViewportHeight = window.innerHeight;

        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIPad = /iPad|Macintosh/.test(navigator.userAgent) && 'ontouchend' in document;
        const isMobile = isAndroid || isIPad || /iPhone/i.test(navigator.userAgent);

        // 监听键盘弹出/收起 - 使用 Visual Viewport API 更精确
        function setupKeyboardListener() {
            if (!isMobile) return;
            
            // 使用 Visual Viewport API 检测键盘
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => {
                    const currentHeight = window.visualViewport.height;
                    const keyboardHeight = originalViewportHeight - currentHeight;
                    
                    if (keyboardHeight > 150) {
                        // 键盘弹出
                        document.body.classList.add('keyboard-open');
                    } else {
                        // 键盘收起
                        document.body.classList.remove('keyboard-open');
                        // 收起键盘时，确保滚动到底部的内容能回滚
                        setTimeout(() => {
                            if (pendingJump !== null) {
                                const rowEl = document.getElementById(`row-${pendingJump}`);
                                if (rowEl) {
                                    rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                }
                            }
                        }, 100);
                    }
                });
            }
            
            // 备用方案：监听 resize 事件
            window.addEventListener('resize', () => {
                const currentHeight = window.innerHeight;
                const keyboardHeight = originalViewportHeight - currentHeight;
                
                if (keyboardHeight > 150) {
                    document.body.classList.add('keyboard-open');
                } else {
                    document.body.classList.remove('keyboard-open');
                }
            });
        }

        function hideKeyboard() {
            if (currentInputElement) {
                currentInputElement.blur();
                currentInputElement = null;
            }
            document.activeElement?.blur();
            document.body.classList.remove('keyboard-open');
        }

        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    db = data.db || [];
                    columns = data.columns || [];
                }
                if (!columns.length) {
                    columns = ['实际数量', '商品名称', '编码', '价格'];
                    db = [];
                }
                if (!db.length) {
                    db = [];
                }
                db.forEach(row => {
                    if (row['实际数量'] === undefined) row['实际数量'] = '';
                });
            } catch(e) {
                console.error(e);
                columns = ['实际数量', '商品名称', '编码', '价格'];
                db = [];
            }
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    db: db,
                    columns: columns,
                    version: VERSION
                }));
            } catch(e) {
                showToast("存储空间不足", true);
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#dc2626' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        function playBeep(success) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = success ? 1200 : 400;
                gainNode.gain.value = 0.4;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
                oscillator.stop(audioCtx.currentTime + 0.2);
                audioCtx.resume();
            } catch(e) {}
        }

        function vibrate() {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(30);
            }
        }

        function preprocessCode(code) {
            if (!code) return code;
            let cleaned = code.replace(/[^\w\d\-]/g, '');
            if (cleaned.startsWith('*') && cleaned.endsWith('*')) {
                cleaned = cleaned.slice(1, -1);
            }
            if (cleaned.length === 12 && /^\d+$/.test(cleaned)) {
                cleaned = '0' + cleaned;
            }
            return cleaned;
        }

        function exactMatch(code, dbValue) {
            if (!code || !dbValue) return false;
            
            const codeStr = String(code).trim();
            const dbStr = String(dbValue).trim();
            
            if (codeStr === dbStr) return true;
            
            const processedCode = preprocessCode(codeStr);
            const processedDb = preprocessCode(dbStr);
            if (processedCode === processedDb) return true;
            
            if (codeStr.toLowerCase() === dbStr.toLowerCase()) return true;
            
            if (/^\d+$/.test(codeStr) && /^\d+$/.test(dbStr)) {
                const codeNum = codeStr.replace(/^0+/, '');
                const dbNum = dbStr.replace(/^0+/, '');
                if (codeNum === dbNum && codeNum.length > 0) return true;
            }
            
            return false;
        }

        function isBarcodeInDatabase(code) {
            if (!code || db.length === 0) return false;
            
            const codeStr = String(code).trim();
            
            for (let i = 0; i < db.length; i++) {
                const row = db[i];
                for (let key in row) {
                    const val = String(row[key] || '').trim();
                    if (exactMatch(codeStr, val)) {
                        return true;
                    }
                }
            }
            return false;
        }

        function findBarcodeRow(code) {
            if (!code || db.length === 0) return -1;
            
            const codeStr = String(code).trim();
            
            for (let i = 0; i < db.length; i++) {
                const row = db[i];
                for (let key in row) {
                    const val = String(row[key] || '').trim();
                    if (exactMatch(codeStr, val)) {
                        return i;
                    }
                }
            }
            return -1;
        }

        function jumpToRowAndFocusQty(foundIndex) {
            const rowEl = document.getElementById(`row-${foundIndex}`);
            if (rowEl) {
                document.querySelectorAll('#mainTable tbody tr').forEach(tr => {
                    tr.classList.remove('row-focus');
                });
                rowEl.classList.add('row-focus');
                rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                const qtyInput = document.getElementById(`qty-${foundIndex}`);
                if (qtyInput) {
                    currentInputElement = qtyInput;
                    setTimeout(() => {
                        qtyInput.focus();
                        qtyInput.select();
                        qtyInput.style.transform = 'scale(1.02)';
                        qtyInput.style.borderColor = '#10b981';
                        qtyInput.style.backgroundColor = '#fef9c3';
                        
                        const handleInputComplete = function(e) {
                            if (e.type === 'blur' || (e.type === 'keypress' && e.key === 'Enter')) {
                                hideKeyboard();
                                qtyInput.removeEventListener('blur', handleInputComplete);
                                qtyInput.removeEventListener('keypress', handleInputComplete);
                            }
                        };
                        qtyInput.addEventListener('blur', handleInputComplete);
                        qtyInput.addEventListener('keypress', handleInputComplete);
                        
                        setTimeout(() => {
                            if (qtyInput) {
                                qtyInput.style.transform = '';
                                qtyInput.style.borderColor = '';
                                qtyInput.style.backgroundColor = '';
                            }
                        }, 500);
                    }, 300);
                }
                return true;
            }
            return false;
        }

        function stopScanningAndJump(foundIndex) {
            pendingJump = foundIndex;
            scanning = false;
            
            if (currentFocusInterval) {
                clearInterval(currentFocusInterval);
                currentFocusInterval = null;
            }
            
            if (reader) {
                try {
                    reader.reset();
                } catch(e) {}
                reader = null;
            }
            
            const videoEl = document.getElementById('video');
            if (videoEl && videoEl.srcObject) {
                const tracks = videoEl.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                videoEl.srcObject = null;
            }
            
            const scanUI = document.getElementById('scanUI');
            scanUI.style.display = 'none';
            
            setTimeout(() => {
                jumpToRowAndFocusQty(foundIndex);
                pendingJump = null;
            }, 150);
        }

        function handleBarcode(code, fromCamera = false) {
            if (!code) return false;
            
            const now = Date.now();
            const codeStr = String(code).trim();
            
            if (codeStr === lastCode && (now - lastTime) < 200) {
                return false;
            }
            lastCode = codeStr;
            lastTime = now;
            
            if (!isBarcodeInDatabase(codeStr)) {
                playBeep(false);
                showToast(`❌ 条码不存在: ${codeStr.substring(0, 20)}`, true);
                return false;
            }
            
            const foundIndex = findBarcodeRow(codeStr);
            
            if (foundIndex !== -1) {
                playBeep(true);
                vibrate();
                const productName = db[foundIndex]['商品名称'] || db[foundIndex]['名称'] || codeStr;
                showToast(`✅ ${productName}`, false);
                
                const scanFrame = document.getElementById('scanFrame');
                if (scanFrame) {
                    scanFrame.classList.add('scan-success');
                    setTimeout(() => scanFrame.classList.remove('scan-success'), 200);
                }
                
                if (fromCamera) {
                    stopScanningAndJump(foundIndex);
                } else {
                    jumpToRowAndFocusQty(foundIndex);
                }
                return true;
            } else {
                playBeep(false);
                showToast(`❌ 未找到: ${codeStr.substring(0, 20)}`, true);
                return false;
            }
        }

        async function startScanning() {
            if (scanning) {
                showToast("扫描器已在运行", false);
                return;
            }
            
            const scanUI = document.getElementById('scanUI');
            scanUI.style.display = 'flex';
            scanning = true;
            
            if (reader) {
                try {
                    await reader.reset();
                } catch(e) {}
                reader = null;
            }
            
            try {
                let constraints;
                if (isAndroid) {
                    constraints = {
                        video: {
                            facingMode: { exact: "environment" },
                            width: { ideal: 1280, min: 960 },
                            height: { ideal: 720, min: 540 },
                            frameRate: { ideal: 60, min: 30 }
                        }
                    };
                } else {
                    constraints = {
                        video: {
                            facingMode: { exact: "environment" },
                            width: { ideal: 1920, min: 1280 },
                            height: { ideal: 1080, min: 720 },
                            frameRate: { ideal: 60, min: 30 }
                        }
                    };
                }
                
                let finalConstraints = constraints;
                try {
                    await navigator.mediaDevices.getUserMedia(constraints);
                } catch(e) {
                    finalConstraints = {
                        video: {
                            facingMode: "environment",
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        }
                    };
                }
                
                const hints = new Map();
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                hints.set(ZXing.DecodeHintType.CHARACTER_SET, "UTF-8");
                hints.set(ZXing.DecodeHintType.ALLOWED_LENGTHS, null);
                hints.set(ZXing.DecodeHintType.RETURN_CODABAR_START_END, true);
                hints.set(ZXing.DecodeHintType.ASSUME_CODE_39_CHECK_DIGIT, false);
                hints.set(ZXing.DecodeHintType.ASSUME_GS1, false);
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                    ZXing.BarcodeFormat.QR_CODE,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.UPC_A,
                    ZXing.BarcodeFormat.UPC_E,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.ITF,
                    ZXing.BarcodeFormat.CODABAR,
                    ZXing.BarcodeFormat.DATA_MATRIX,
                    ZXing.BarcodeFormat.PDF_417,
                    ZXing.BarcodeFormat.AZTEC,
                    ZXing.BarcodeFormat.MAXICODE,
                    ZXing.BarcodeFormat.RSS_14,
                    ZXing.BarcodeFormat.RSS_EXPANDED
                ]);
                
                reader = new ZXing.BrowserMultiFormatReader(hints);
                reader.timeBetweenDecodingAttempts = 10;
                
                await reader.decodeFromConstraints(finalConstraints, 'video', (result, error) => {
                    if (result && scanning) {
                        const code = result.getText();
                        if (code) {
                            handleBarcode(code, true);
                        }
                    }
                });
                
                showToast("SupeRapido 智能识别已启动", false);
                
                const videoEl = document.getElementById('video');
                const focusInterval = setInterval(() => {
                    if (!scanning) {
                        clearInterval(focusInterval);
                        return;
                    }
                    if (videoEl && videoEl.srcObject) {
                        const track = videoEl.srcObject.getVideoTracks()[0];
                        if (track && track.getCapabilities) {
                            const caps = track.getCapabilities();
                            if (caps.focusMode && caps.focusMode.includes('continuous')) {
                                track.applyConstraints({
                                    advanced: [{ focusMode: 'continuous' }]
                                }).catch(() => {});
                            }
                            if (caps.exposureMode && caps.exposureMode.includes('continuous')) {
                                track.applyConstraints({
                                    advanced: [{ exposureMode: 'continuous' }]
                                }).catch(() => {});
                            }
                            if (caps.exposureCompensation) {
                                track.applyConstraints({
                                    advanced: [{ exposureCompensation: 0 }]
                                }).catch(() => {});
                            }
                        }
                    }
                }, 300);
                
                currentFocusInterval = focusInterval;
                
            } catch(err) {
                console.error("相机错误:", err);
                showToast("无法启动摄像头，请检查权限", true);
                stopScanning(true);
            }
        }

        function stopScanning(manual = false) {
            scanning = false;
            if (currentFocusInterval) {
                clearInterval(currentFocusInterval);
                currentFocusInterval = null;
            }
            if (reader) {
                try {
                    reader.reset();
                } catch(e) {}
                reader = null;
            }
            const videoEl = document.getElementById('video');
            if (videoEl && videoEl.srcObject) {
                const tracks = videoEl.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                videoEl.srcObject = null;
            }
            const scanUI = document.getElementById('scanUI');
            scanUI.style.display = 'none';
        }

        function autoAdjustColumns() {
            const table = document.getElementById('mainTable');
            if (!table) return;
            
            const colCount = columns.length;
            if (colCount === 0) return;
            
            const headers = table.querySelectorAll('thead th');
            const rows = table.querySelectorAll('tbody tr');
            
            if (headers.length === 0) return;
            
            const colMaxWidths = new Array(colCount).fill(0);
            
            headers.forEach((th, idx) => {
                if (idx < colCount) {
                    const headerText = th.textContent || '';
                    let headerWidth = headerText.length * 14 + 40;
                    colMaxWidths[idx] = Math.max(colMaxWidths[idx], Math.min(headerWidth, 200));
                }
            });
            
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                cells.forEach((cell, idx) => {
                    if (idx < colCount) {
                        const input = cell.querySelector('input');
                        let text = '';
                        if (input) {
                            text = input.value || input.placeholder || '';
                        } else {
                            text = cell.textContent || '';
                        }
                        let textWidth = 0;
                        for (let i = 0; i < text.length; i++) {
                            const code = text.charCodeAt(i);
                            if (code >= 0x4e00 && code <= 0x9fff) {
                                textWidth += 16;
                            } else if (code >= 0x30 && code <= 0x39) {
                                textWidth += 8;
                            } else {
                                textWidth += 10;
                            }
                        }
                        textWidth = Math.max(textWidth + 30, 80);
                        textWidth = Math.min(textWidth, 250);
                        if (textWidth > colMaxWidths[idx]) {
                            colMaxWidths[idx] = textWidth;
                        }
                    }
                });
            });
            
            headers.forEach((th, idx) => {
                if (idx < colCount && colMaxWidths[idx] > 0) {
                    th.style.width = colMaxWidths[idx] + 'px';
                    th.style.minWidth = colMaxWidths[idx] + 'px';
                }
            });
        }

        function render() {
            const thead = document.getElementById('tHead');
            const tbody = document.getElementById('tBody');
            
            if (!columns.length) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center p-6 text-gray-500">暂无数据，请导入Excel或添加列表</td> </tr>';
                return;
            }
            
            thead.innerHTML = `<tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr>`;
            
            tbody.innerHTML = db.map((row, idx) => `
                <tr id="row-${idx}">
                    ${columns.map(col => `
                        <td>
                            ${col === '实际数量' ? 
                                `<input id="qty-${idx}" type="number" value="${row[col] || ''}" 
                                    class="qty-input" 
                                    onchange="updateQty(${idx}, this.value)"
                                    onfocus="this.select()"
                                    placeholder="0"
                                    inputmode="numeric" />` :
                                `<input type="text" value="${escapeHtml(String(row[col] || ''))}" 
                                    class="w-full p-2 text-sm outline-none bg-transparent"
                                    style="min-width:80px; width:100%;"
                                    onchange="updateCell(${idx}, '${col}', this.value)" />`
                            }
                        </td>
                    `).join('')}
                </tr>
            `).join('');
            
            setTimeout(() => {
                autoAdjustColumns();
            }, 50);
            
            if (pendingJump !== null) {
                setTimeout(() => {
                    jumpToRowAndFocusQty(pendingJump);
                    pendingJump = null;
                }, 100);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function updateQty(rowIndex, value) {
            db[rowIndex]['实际数量'] = value;
            saveData();
            showToast("已保存", false);
            hideKeyboard();
        }
        
        function updateCell(rowIndex, col, value) {
            db[rowIndex][col] = value;
            saveData();
        }
        
        function renderColList() {
            const container = document.getElementById('colList');
            container.innerHTML = columns.map((col, idx) => `
                <div class="col-item p-3" draggable="true" data-index="${idx}" data-col="${col}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 flex-1">
                            <span class="drag-handle text-xl cursor-move">☰</span>
                            <span class="font-bold text-sm">${idx + 1}. ${col}</span>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="moveColumnUp(${idx})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">⬆️</button>
                            <button onclick="moveColumnDown(${idx})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">⬇️</button>
                            <button onclick="deleteColumn('${col}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">删</button>
                        </div>
                    </div>
                </div>
            `).join('');
            setupDragAndDrop();
        }
        
        function setupDragAndDrop() {
            const items = document.querySelectorAll('.col-item');
            let draggedItem = null;
            items.forEach(item => {
                item.setAttribute('draggable', 'true');
                item.addEventListener('dragstart', (e) => {
                    draggedItem = item;
                    item.style.opacity = '0.5';
                    e.dataTransfer.effectAllowed = 'move';
                });
                item.addEventListener('dragend', (e) => {
                    item.style.opacity = '';
                    draggedItem = null;
                });
                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });
                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (!draggedItem || draggedItem === item) return;
                    const fromIndex = parseInt(draggedItem.getAttribute('data-index'));
                    const toIndex = parseInt(item.getAttribute('data-index'));
                    if (!isNaN(fromIndex) && !isNaN(toIndex)) {
                        const temp = columns[fromIndex];
                        columns[fromIndex] = columns[toIndex];
                        columns[toIndex] = temp;
                        renderColList();
                        render();
                        saveData();
                        showToast("列顺序已更新", false);
                    }
                });
            });
        }
        
        function moveColumnUp(index) {
            if (index > 0) {
                const temp = columns[index];
                columns[index] = columns[index - 1];
                columns[index - 1] = temp;
                renderColList();
                render();
                saveData();
                showToast("列顺序已更新", false);
            }
        }
        
        function moveColumnDown(index) {
            if (index < columns.length - 1) {
                const temp = columns[index];
                columns[index] = columns[index + 1];
                columns[index + 1] = temp;
                renderColList();
                render();
                saveData();
                showToast("列顺序已更新", false);
            }
        }
        
        function openColModal() {
            renderColList();
            document.getElementById('colModal').style.display = 'flex';
        }
        
        function closeColModal() {
            document.getElementById('colModal').style.display = 'none';
            render();
        }
        
        function addColumn() {
            const newCol = document.getElementById('newColName').value.trim();
            if (newCol && !columns.includes(newCol)) {
                columns.push(newCol);
                db.forEach(row => row[newCol] = '');
                renderColList();
                render();
                saveData();
                showToast(`已添加列: ${newCol}`, false);
                document.getElementById('newColName').value = '';
            } else if (columns.includes(newCol)) {
                showToast("列名已存在", true);
            }
        }
        
        function deleteColumn(colName) {
            if (confirm(`确定删除列 "${colName}" 吗？数据将丢失！`)) {
                const index = columns.indexOf(colName);
                if (index !== -1) {
                    columns.splice(index, 1);
                    db.forEach(row => delete row[colName]);
                    renderColList();
                    render();
                    saveData();
                    showToast(`已删除列: ${colName}`, false);
                }
            }
        }
        
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            showToast("正在导入...", false);
            const fileReader = new FileReader();
            fileReader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                    
                    if (json.length > 0) {
                        columns = Object.keys(json[0]);
                        if (!columns.includes('实际数量')) {
                            columns.unshift('实际数量');
                        }
                        db = json.map(row => {
                            const newRow = { ...row };
                            if (newRow['实际数量'] === undefined) newRow['实际数量'] = '';
                            return newRow;
                        });
                        saveData();
                        render();
                        showToast(`✅ 导入成功！共 ${db.length} 条数据`, false);
                    } else {
                        showToast("文件无数据", true);
                    }
                } catch(err) {
                    showToast("解析失败", true);
                }
            };
            fileReader.readAsArrayBuffer(file);
            e.target.value = '';
        };
        
        function exportExcel() {
            if (!db.length) {
                showToast("暂无数据可导出", true);
                return;
            }
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "库存数据");
            const fileName = `飞速盘点_${new Date().toLocaleDateString()}.xlsx`;
            XLSX.writeFile(wb, fileName);
            showToast("✅ 导出成功", false);
        }
        
        function hardReset() {
            if (confirm("⚠️ 确定清空所有数据吗？此操作不可恢复！")) {
                localStorage.removeItem(STORAGE_KEY);
                db = [];
                columns = ['实际数量', '商品名称', '编码', '价格'];
                saveData();
                render();
                showToast("已清空所有数据", false);
            }
        }
        
        window.addEventListener('resize', () => {
            setTimeout(() => autoAdjustColumns(), 100);
        });
        
        window.addEventListener('beforeunload', () => {
            if (scanning) {
                stopScanning(true);
            }
        });
        
        document.addEventListener('touchstart', function(e) {
            if (currentInputElement && !e.target.closest('.qty-input') && !e.target.closest('#manualInput')) {
                hideKeyboard();
            }
        });
        
        loadData();
        render();
        setupKeyboardListener();
        
        document.getElementById('confirmBtn').onclick = () => {
            const input = document.getElementById('manualInput');
            if (input.value.trim()) {
                handleBarcode(input.value, false);
                input.value = '';
            }
            hideKeyboard();
        };
        
        document.getElementById('manualInput').onkeypress = (e) => {
            if (e.key === 'Enter') {
                const input = e.target;
                if (input.value.trim()) {
                    handleBarcode(input.value, false);
                    input.value = '';
                }
                hideKeyboard();
            }
        };
        
        document.getElementById('scanBtn').onclick = () => {
            if (scanning) {
                stopScanning(true);
            } else {
                startScanning();
            }
            hideKeyboard();
        };
        
        console.log(`⚡ 飞速盘点 ${VERSION} - SupeRapido 智能识别引擎已启动 | 扫码按钮始终可见`);
    </script>
</body>
</html>
