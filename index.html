<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V50 PRO FINAL FIX</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f1f5f9;font-family:sans-serif}

.btn{
padding:12px 18px;
font-size:18px;
border-radius:10px;
margin:5px;
}

.table-container{
background:#fff;
border:2px solid #1e293b;
height:60vh;
overflow:auto;
border-radius:12px;
}

th{position:sticky;top:0;background:#0f172a;color:#fff;padding:10px}
td{border:1px solid #ddd}

.qty-input{
width:100%;
height:60px;
font-size:22px;
text-align:center;
border:3px solid #2563eb
}

.row-focus{background:#fef08a}

#toast{
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
color:#fff;
padding:15px;
border-radius:10px;
display:none;
z-index:9999
}

.dragging{opacity:0.5;background:#ddd}
</style>
</head>

<body class="p-2">

<div id="toast"></div>

<h2 class="text-xl font-bold mb-2">扫码盘点（稳定修复版）</h2>

<!-- 顶部操作区 -->
<div class="flex flex-wrap items-center">

<button onclick="startScanning()" class="btn bg-blue-600 text-white">📷 扫码</button>

<input id="manualInput" placeholder="输入条码"
class="border p-3 text-lg rounded w-48">

<button onclick="manual()" class="btn bg-gray-700 text-white">确认</button>

<input type="file" id="fileInput" class="btn">

<button onclick="exportExcel()" class="btn bg-green-600 text-white">导出</button>

<button onclick="openColModal()" class="btn bg-black text-white">列管理</button>

</div>

<div class="table-container mt-2">
<table>
<thead id="tHead"></thead>
<tbody id="tBody"></tbody>
</table>
</div>

<!-- 列管理 -->
<div id="colModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8)">
<div style="background:#fff;margin:10% auto;padding:20px;width:90%">
<h3>拖拽排序</h3>
<div id="colList"></div>
<button onclick="closeColModal()">完成</button>
</div>
</div>

<!-- 扫码 -->
<div id="scanUI" style="display:none;position:fixed;inset:0;background:#000">
<video id="video" style="width:100%;height:100%" autoplay playsinline></video>
<button onclick="stopScanning()" style="position:absolute;top:20px;right:20px;background:red;color:#fff;padding:10px">退出</button>
</div>

<script>

let db=[],columns=[];
let dragIndex=null;

/* ===== toast ===== */
function showToast(msg,color="#ef4444"){
let t=toast;
t.innerText=msg;
t.style.background=color;
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

/* ===== Excel ===== */
fileInput.onchange=e=>{
let f=e.target.files[0];
if(!f)return;

let r=new FileReader();

r.onload=ev=>{
try{
let data=new Uint8Array(ev.target.result);
let wb=XLSX.read(data,{type:'array'});
let json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});

columns=Object.keys(json[0]);

if(!columns.includes("实际数量")){
columns.unshift("实际数量");
json.forEach(r=>r["实际数量"]="");
}

db=json;
save();
render();

}catch{
showToast("文件错误");
}
};

r.readAsArrayBuffer(f);
};

/* ===== 渲染 ===== */
function render(){
tHead.innerHTML="<tr>"+columns.map(c=>"<th>"+c+"</th>").join("")+"</tr>";

tBody.innerHTML=db.map((r,i)=>`
<tr id="r-${i}">
${columns.map(c=>`
<td>
<input value="${r[c]||""}"
class="${c=="实际数量"?"qty-input":""}"
onchange="edit(${i},'${c}',this.value)">
</td>`).join("")}
</tr>`).join("");
}

function edit(i,c,v){db[i][c]=v;save();}

/* ===== 扫码（修复版） ===== */
let codeReader=new ZXing.BrowserMultiFormatReader();

function startScanning(){
scanUI.style.display="block";

codeReader.decodeFromVideoDevice(null,"video",(result,err)=>{
if(result){
handle(result.getText());
}
});
}

function stopScanning(){
codeReader.reset();
scanUI.style.display="none";
}

/* ===== 条码处理 ===== */
function normalize(v){return String(v).trim().toLowerCase();}

function handle(code){

let idx=db.findIndex(r=>
Object.values(r).some(v=>normalize(v)==normalize(code))
);

if(idx!=-1){

render();

document.querySelectorAll("tr").forEach(tr=>tr.classList.remove("row-focus"));

let row=document.getElementById("r-"+idx);
row.classList.add("row-focus");
row.scrollIntoView({block:"center"});

}else{
navigator.vibrate&&navigator.vibrate(100);
showToast("未找到:"+code);
}
}

/* ===== 手动 ===== */
function manual(){
handle(manualInput.value);
manualInput.value="";
}

/* ===== 导出 ===== */
function exportExcel(){
let ws=XLSX.utils.json_to_sheet(db,{header:columns});
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"data");
XLSX.writeFile(wb,"库存.xlsx");
}

/* ===== 本地 ===== */
function save(){
localStorage.setItem("db",JSON.stringify(db));
localStorage.setItem("columns",JSON.stringify(columns));
}

db=JSON.parse(localStorage.getItem("db"))||[];
columns=JSON.parse(localStorage.getItem("columns"))||[];

if(columns.length)render();

/* ===== 列拖拽（修复） ===== */
function openColModal(){
colModal.style.display="block";
renderColList();
}

function closeColModal(){
colModal.style.display="none";
}

function renderColList(){
colList.innerHTML=columns.map((c,i)=>`
<div draggable="true"
ondragstart="dragStart(${i},this)"
ondragover="event.preventDefault()"
ondrop="dropCol(${i})"
style="padding:10px;border:1px solid #ccc;margin:5px;background:#f9f9f9">

☰ ${c}
<button onclick="deleteCol('${c}')" style="float:right;color:red">删除</button>
</div>
`).join("");
}

function dragStart(i,el){
dragIndex=i;
el.classList.add("dragging");
}

function dropCol(i){
if(dragIndex===null)return;

let item=columns.splice(dragIndex,1)[0];
columns.splice(i,0,item);

dragIndex=null;

save();
renderColList();
render();
}

function deleteCol(c){
columns=columns.filter(x=>x!=c);
save();
renderColList();
render();
}

</script>

</body>
</html>
