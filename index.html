<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SuperRapido V50 Pro - REPAIRED</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; font-family: system-ui, -apple-system, sans-serif; }
        .table-container { background: white; border: 2px solid #1e293b; height: 55vh; overflow: auto; border-radius: 12px; -webkit-overflow-scrolling: touch; }
        table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 65px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        #colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .scan-frame { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 220px; border: 3px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #3b82f6; top: 0; animation: scanLineMove 1.5s infinite linear; box-shadow: 0 0 15px #3b82f6; }
        @keyframes scanLineMove { 0% { top: 5%; } 50% { top: 95%; } 100% { top: 5%; } }
    </style>
</head>
<body class="p-2">
    <div id="colModal">
        <div class="bg-white w-11/12 max-h-[85vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl">
            <h2 class="text-2xl font-black mb-4 border-b-2 pb-2 text-center text-slate-800">列管理 / Columnas</h2>
            <div id="colList" class="space-y-2 mb-6"></div>
            <div class="flex gap-2 p-3 bg-slate-100 rounded-2xl border-2">
                <input type="text" id="newColName" placeholder="新列名..." class="flex-1 bg-transparent font-bold outline-none text-lg" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-6 bg-slate-900 text-white py-5 rounded-2xl font-black text-xl">完成返回</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex items-center justify-between mb-3 px-1">
            <h1 class="text-3xl font-black italic">V50</h1>
            <div class="flex flex-1 justify-end gap-3 ml-4">
                <button onclick="openColModal()" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-black text-sm">列管理</button>
                <button onclick="hardReset()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black text-sm">重置</button>
            </div>
        </div>

        <div class="flex gap-3 mb-4 bg-white p-3 rounded-3xl shadow-xl border-2 border-slate-100 items-center">
            <button onclick="startScanning()" class="w-24 h-24 bg-blue-600 text-white rounded-3xl text-5xl active:scale-95 flex items-center justify-center border-4 border-white shadow-lg">📷</button>
            <div class="flex-1 flex flex-col gap-2">
                <div class="flex flex-col gap-1">
                    <input type="text" id="manualInput" placeholder="点击录入..." class="w-full border-4 border-blue-100 rounded-xl px-4 h-12 font-bold outline-none focus:border-blue-600 text-lg" />
                    <button onclick="handleManual()" class="w-full bg-blue-700 text-white py-3 rounded-xl font-black text-lg shadow-lg">确认录入</button>
                </div>
                <label class="bg-slate-100 text-slate-500 h-10 flex items-center justify-center rounded-xl border-2 border-dashed border-slate-300 text-xs font-bold uppercase cursor-pointer">
                    📂 导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
                </label>
            </div>
        </div>

        <div class="table-container">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>
        
        <button onclick="exportExcel()" class="mt-4 bg-emerald-700 text-white py-5 rounded-2xl font-black text-2xl shadow-xl border-b-8 border-emerald-900">💾 导出保存 Excel</button>
    </div>

    <div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b-2 border-blue-500">
            <span class="font-bold text-blue-400">正在扫描...</span>
            <button onclick="stopScanning()" class="bg-red-600 px-10 py-3 rounded-full font-black">退出</button>
        </div>
        <div class="relative flex-1 bg-black">
            <video id="v" class="w-full h-full object-cover" playsinline muted></video>
            <div class="scan-frame"><div class="scan-line"></div></div>
        </div>
    </div>

    <script>
        const VER = "SR_V50_ULTRA_SENSITIVE";
        let db = [], columns = [], widths = {}, track = null;

        // 初始化加载数据
        function init() {
            try {
                db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
                columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
                widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};
            } catch(e) { console.error("Load Error", e); }
            if (columns.length) render();
        }

        const zxing = new ZXing.BrowserMultiFormatReader();

        // 声音反馈
        function playBeep(isSuccess) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(isSuccess ? 1000 : 250, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start(); osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        async function startScanning() {
            const ui = document.getElementById('scanUI');
            ui.style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const videoEl = document.getElementById('v');
                videoEl.srcObject = stream;
                track = stream.getVideoTracks()[0];
                
                zxing.decodeFromVideoElement(videoEl, (res) => {
                    if (res) handleBarcode(res.getText(), true);
                });
            } catch (err) { alert("相机开启失败"); stopScanning(); }
        }

        function stopScanning() {
            zxing.reset();
            if(track) track.stop();
            document.getElementById('scanUI').style.display = 'none';
        }

        function handleBarcode(code, fromCam = false) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            const idx = db.findIndex(row => Object.values(row).some(v => v && String(v).trim().toLowerCase() === target));
            
            if (idx !== -1) {
                playBeep(true);
                if(fromCam) stopScanning();
                render();
                setTimeout(() => {
                    const row = document.getElementById(`r-${idx}`);
                    const input = document.getElementById(`in-${idx}-实际数量`);
                    document.querySelectorAll('tr').forEach(t => t.classList.remove('row-focus'));
                    if (row) {
                        row.classList.add('row-focus');
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        if(input){ input.focus(); input.select(); }
                    }
                }, 300);
            } else {
                playBeep(false);
                alert("未找到条码: " + target);
            }
        }

        function handleManual() {
            const input = document.getElementById('manualInput');
            handleBarcode(input.value);
            input.value = '';
        }

        // 文件导入修复
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                if (json.length) {
                    columns = Object.keys(json[0]);
                    if (!columns.includes('实际数量')) columns.unshift('实际数量');
                    db = json; push(); render();
                }
            };
            reader.readAsArrayBuffer(file);
        };

        function render() {
            const h = document.getElementById('tHead');
            const b = document.getElementById('tBody');
            h.innerHTML = `<tr>${columns.map(c => `<th style="width:${widths[c]||130}px">${c}</th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `
                <tr id="r-${rIdx}">
                    ${columns.map(c => `<td><input id="in-${rIdx}-${c}" type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'p-2 w-full text-sm outline-none bg-transparent'}" onchange="saveVal(${rIdx},'${c}',this.value)" /></td>`).join('')}
                </tr>`).join('');
        }

        function saveVal(r, c, v) { db[r][c] = v; push(); }
        function push() {
            localStorage.setItem(VER+'_DATA', JSON.stringify(db));
            localStorage.setItem(VER+'_COLS', JSON.stringify(columns));
            localStorage.setItem(VER+'_W', JSON.stringify(widths));
        }

        // 列移动功能修复
        function moveCol(i, d) {
            let t = i + d;
            if (t >= 0 && t < columns.length) {
                [columns[i], columns[t]] = [columns[t], columns[i]];
                push(); renderColList(); render();
            }
        }

        function openColModal() { document.getElementById('colModal').style.display = 'flex'; renderColList(); }
        function closeColModal() { document.getElementById('colModal').style.display = 'none'; }
        
        function renderColList() {
            document.getElementById('colList').innerHTML = columns.map((c, i) => `
                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-xl border-2">
                    <span class="font-bold text-slate-700">${c}</span>
                    <div class="flex gap-2">
                        <button onclick="moveCol(${i},-1)" class="p-2 border bg-white rounded">⬆️</button>
                        <button onclick="moveCol(${i},1)" class="p-2 border bg-white rounded">⬇️</button>
                        <button onclick="deleteCol('${c}')" class="p-2 text-red-600 font-bold ml-2">删</button>
                    </div>
                </div>`).join('');
        }

        function addColumn() {
            const n = document.getElementById('newColName').value.trim();
            if (n && !columns.includes(n)) { columns.push(n); db.forEach(r => r[n] = ""); push(); renderColList(); render(); }
            document.getElementById('newColName').value = '';
        }
        function deleteCol(n) { if(confirm("删除列？")) { columns = columns.filter(c => c !== n); push(); renderColList(); render(); } }
        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(db, { header: columns });
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, `Stock_${new Date().getTime()}.xlsx`);
        }
        function hardReset() { if(confirm("清空全部？")) { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
