<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>V50 ULTRA PRO - 修正版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; touch-action: pan-x pan-y; font-family: system-ui, sans-serif; overflow: hidden; }
        .table-container { background: white; border: 2px solid #1e293b; height: 50vh; overflow: auto; border-radius: 12px; }
        table { border-collapse: separate; border-spacing: 0; width: max-content; }
        th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; padding: 12px; font-size: 13px; text-align: left; }
        td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
        .qty-input { width: 100%; height: 60px; border: 4px solid #2563eb !important; text-align: center; font-size: 2.2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #eff6ff; }
        .row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
        
        /* 扫描 UI 增强 */
        #scanUI { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        #v { width: 100%; height: 100%; object-fit: cover; }
        .scan-frame { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 180px; border: 3px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 4000px rgba(0,0,0,0.7); z-index: 10; pointer-events: none; }
        .laser { position: absolute; width: 100%; height: 2px; background: #ef4444; top: 50%; box-shadow: 0 0 15px #ef4444; }

        /* 提示框增强 */
        #toast { position: fixed; top: 12%; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 15px 30px; border-radius: 15px; z-index: 10001; display: none; font-weight: 900; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; width: 80%; }
    </style>
</head>
<body class="p-2">
    <div id="toast"></div>

    <div id="colModal" class="fixed inset-0 bg-black/80 z-[1000] hidden items-center justify-center">
        <div class="bg-white w-11/12 max-h-[80vh] rounded-3xl p-6 overflow-auto border-4 border-slate-900 shadow-2xl text-slate-900">
            <h2 class="text-2xl font-black mb-4 border-b-2 pb-2 italic">列管理 / Columnas</h2>
            <div id="colList" class="space-y-2 mb-6"></div>
            <div class="flex gap-2 p-3 bg-slate-100 rounded-xl border-2">
                <input type="text" id="newColName" placeholder="新列名..." class="flex-1 bg-transparent font-bold outline-none" />
                <button onclick="addColumn()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">添加</button>
            </div>
            <button onclick="closeColModal()" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg">确定并保存</button>
        </div>
    </div>

    <div class="flex flex-col h-screen">
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-2xl font-black italic tracking-tighter">V50 <span class="text-blue-600">ULTRA PRO</span></h1>
            <div class="flex gap-2">
                <button onclick="openColModal()" class="bg-slate-700 text-white px-3 py-2 rounded-lg text-xs font-bold shadow-md">列管理</button>
                <button onclick="hardReset()" class="bg-red-500 text-white px-3 py-2 rounded-lg text-xs font-bold shadow-md">清空重置</button>
            </div>
        </div>

        <div class="bg-white p-3 rounded-2xl shadow-lg flex items-center gap-3 border-2 border-slate-100 mb-3">
            <button onclick="startScanning()" class="w-24 h-24 bg-blue-600 rounded-full text-5xl shadow-xl flex items-center justify-center text-white active:scale-95 border-4 border-blue-100">📷</button>
            <div class="flex-1">
                <input type="text" id="manualInput" placeholder="输入条码..." class="w-full border-b-4 border-blue-50 p-2 text-xl font-bold outline-none mb-1 focus:border-blue-600" />
                <button onclick="handleManual()" class="w-full bg-slate-800 text-white py-2 rounded-lg font-bold">手动确认</button>
            </div>
        </div>

        <div class="table-container shadow-inner">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>

        <div class="mt-4 space-y-2">
            <label class="block w-full bg-slate-100 text-slate-500 text-center py-4 rounded-xl font-bold text-sm border-2 border-dashed cursor-pointer">
                📂 导入 EXCEL <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls" />
            </label>
            <button onclick="exportExcel()" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 border-b-4 border-emerald-900">💾 保存导出 Excel</button>
        </div>
    </div>

    <div id="scanUI">
        <div class="p-6 flex justify-between items-center text-white z-50">
            <div class="flex flex-col"><span class="text-blue-400 font-black">强力对焦模式</span><span class="text-[10px] text-gray-400">支持 26 位长码斜角识别</span></div>
            <button onclick="stopScanning()" class="bg-red-600 px-8 py-3 rounded-full font-black">返回</button>
        </div>
        <div class="relative flex-1">
            <video id="v" playsinline muted autoplay></video>
            <div class="scan-frame"><div class="laser"></div></div>
        </div>
    </div>

    <script>
        const VER = "SR_V50_ULTRA_FIXED_V2";
        let db = [], columns = [], widths = {}, lastCode = "", lastTime = 0, track = null;

        // 加载
        function init() {
            try {
                db = JSON.parse(localStorage.getItem(VER+'_DATA')) || [];
                columns = JSON.parse(localStorage.getItem(VER+'_COLS')) || [];
                widths = JSON.parse(localStorage.getItem(VER+'_W')) || {};
            } catch(e) {}
            if (columns.length) render();
        }

        // 工业级识别参数
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.CODE_39]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        const zxing = new ZXing.BrowserMultiFormatReader(hints);
        zxing.timeBetweenDecodingAttempts = 50;

        // 双音反馈
        function beep(isOk) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if(isOk) { // 叮
                    osc.frequency.setValueAtTime(1000, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else { // 咚咚
                    osc.frequency.setValueAtTime(200, ctx.currentTime);
                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.15);
                    setTimeout(() => {
                        const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
                        o2.connect(g2); g2.connect(ctx.destination);
                        o2.frequency.setValueAtTime(150, ctx.currentTime);
                        o2.start(); o2.stop(ctx.currentTime + 0.2);
                    }, 200);
                }
            } catch(e) {}
        }

        async function startScanning() {
            document.getElementById('scanUI').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                const videoEl = document.getElementById('v');
                videoEl.srcObject = stream;
                track = stream.getVideoTracks()[0];

                // 安卓强制补丁：循环触发自动对焦
                const focusLoop = setInterval(() => {
                    if (track && track.getCapabilities?.()?.focusMode?.includes('continuous')) {
                        track.applyConstraints({advanced: [{focusMode: 'continuous'}]}).catch(()=>{});
                    }
                }, 1200);

                zxing.decodeFromVideoElement(videoEl, (res) => {
                    if (res) {
                        const code = res.getText();
                        if (code === lastCode && (Date.now() - lastTime < 1500)) return;
                        lastCode = code; lastTime = Date.now();
                        handleBarcode(code, true);
                    }
                });
            } catch (err) { alert("相机权限被拒"); stopScanning(); }
        }

        function stopScanning() {
            zxing.reset();
            if(track) track.stop();
            document.getElementById('scanUI').style.display = 'none';
        }

        function handleBarcode(code, fromCam = false) {
            if(!code) return;
            const target = String(code).trim().toLowerCase();
            const idx = db.findIndex(row => Object.values(row).some(v => v && String(v).trim().toLowerCase() === target));
            
            if (idx !== -1) {
                beep(true);
                if(fromCam) stopScanning();
                render();
                setTimeout(() => {
                    const row = document.getElementById(`r-${idx}`);
                    const input = document.getElementById(`in-${idx}-实际数量`);
                    document.querySelectorAll('tr').forEach(t => t.classList.remove('row-focus'));
                    if (row) {
                        row.classList.add('row-focus');
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        if(input){ input.focus(); input.select(); }
                    }
                }, 200);
            } else {
                beep(false);
                const t = document.getElementById('toast');
                t.innerText = "❌ 未匹配: " + target;
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 2500);
                // 此时摄像头仍保持开启，允许扫下一个
            }
        }

        function handleManual() { 
            handleBarcode(document.getElementById('manualInput').value); 
            document.getElementById('manualInput').value = ''; 
        }

        function render() {
            const h = document.getElementById('tHead'); const b = document.getElementById('tBody');
            h.innerHTML = `<tr>${columns.map(c => `<th style="width:${widths[c]||130}px">${c}</th>`).join('')}</tr>`;
            b.innerHTML = db.map((row, rIdx) => `
                <tr id="r-${rIdx}">
                    ${columns.map(c => `<td><input id="in-${rIdx}-${c}" type="${c==='实际数量'?'number':'text'}" value="${row[c]||''}" class="${c==='实际数量'?'qty-input':'p-2 w-full text-xs outline-none bg-transparent'}" onchange="db[${rIdx}]['${c}']=this.value;push();" /></td>`).join('')}
                </tr>`).join('');
        }

        function push() { 
            localStorage.setItem(VER+'_DATA', JSON.stringify(db)); 
            localStorage.setItem(VER+'_COLS', JSON.stringify(columns)); 
            localStorage.setItem(VER+'_W', JSON.stringify(widths)); 
        }

        // --- 列管理核心逻辑 ---
        function openColModal() { document.getElementById('colModal').style.display = 'flex'; renderColList(); }
        function closeColModal() { document.getElementById('colModal').style.display = 'none'; render(); }
        
        function renderColList() {
            document.getElementById('colList').innerHTML = columns.map((c, i) => `
                <div class="flex items-center justify-between bg-slate-50 p-4 rounded-xl border-2">
                    <span class="font-black text-slate-700">${c}</span>
                    <div class="flex gap-2">
                        <button onclick="moveCol(${i},-1)" class="p-3 bg-white border rounded shadow-sm">
