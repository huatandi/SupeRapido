<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>SuperRapido V40.1 - 核心稳健版</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.19.1"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background-color: #f8fafc; touch-action: pan-x pan-y; font-family: system-ui; }
.table-container { background: white; border: 2px solid #1e293b; height: 60vh; overflow: auto; border-radius: 12px; position: relative; }
table { border-collapse: separate; border-spacing: 0; table-layout: fixed; width: max-content; }
th { position: sticky; top: 0; z-index: 50; background: #0f172a; color: white; border-right: 1px solid #334155; border-bottom: 3px solid #000; padding: 12px; font-size: 13px; text-align: left; }
.resizer { position: absolute; right: 0; top: 0; height: 100%; width: 15px; cursor: col-resize; z-index: 60; }
td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 2px; }
.qty-input { width: 100%; height: 60px; border: 4px solid #2563eb !important; text-align: center; font-size: 2rem; font-weight: 900; color: #1e40af; border-radius: 8px; background: #fff; }
.row-focus { background-color: #fef08a !important; outline: 6px solid #ef4444; outline-offset: -6px; }
#toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); color: white; padding: 20px; border-radius: 20px; z-index: 10000; display: none; font-weight: 900; text-align: center; width: 80%; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
#colModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
.scan-frame { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 160px; border: 5px solid #3b82f6; border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.7); z-index: 10; pointer-events: none; }
.scan-line { position: absolute; width: 100%; height: 4px; background: #3b82f6; top: 0; animation: scanLineMove 1s infinite linear; box-shadow: 0 0 15px #3b82f6; }
@keyframes scanLineMove { 0% { top: 5%; } 100% { top: 95%; } }
.btn-sm { font-size: 10px !important; padding: 4px 10px !important; }
.cam-btn-v40 { width: 70px !important; height: 70px !important; font-size: 35px !important; flex-shrink: 0; border: 3px solid white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
</style>
</head>

<body class="p-2">

<div id="toast"></div>

<div class="flex flex-col h-screen">

<div class="flex justify-between items-center mb-1">
<h1 class="text-base font-black text-slate-900">V40.1 <span class="bg-blue-700 text-white text-[8px] px-1.5 py-0.5 rounded ml-1">STABLE</span></h1>
</div>

<div class="flex gap-2 mb-2 bg-white p-1.5 rounded-2xl shadow border-2 border-slate-200 items-center">
<button onclick="startScanning()" class="bg-blue-600 text-white rounded-2xl flex items-center justify-center cam-btn-v40">📷</button>
</div>

<div id="scanUI" class="fixed inset-0 bg-black z-[999] hidden flex-col">
<div class="p-4 flex justify-between items-center bg-slate-900 text-white border-b-2 border-blue-500">
<span class="font-bold text-blue-400">正在扫描...</span>
<button onclick="stopScanning()" class="bg-red-600 px-8 py-2 rounded-full font-bold">关闭</button>
</div>

<div class="relative flex-1 overflow-hidden bg-black">
<video id="v" class="w-full h-full object-cover" playsinline muted autoplay></video>
<div class="scan-frame"><div class="scan-line"></div></div>
</div>
</div>

<script>
// ====== ZXING 强化配置 ======
const hints = new Map();
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
  ZXing.BarcodeFormat.EAN_13,
  ZXing.BarcodeFormat.CODE_128,
  ZXing.BarcodeFormat.CODE_39
]);

const zxing = new ZXing.BrowserMultiFormatReader(hints);

let scanLock = false;

// ====== ROI裁剪Canvas ======
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

async function startScanning() {
  const scanUI = document.getElementById('scanUI');
  const video = document.getElementById('v');
  scanUI.style.display = 'flex';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    video.srcObject = stream;
    await video.play();

    scanLock = false;

    requestAnimationFrame(scanLoop);

  } catch (err) {
    alert(err.message);
  }
}

function scanLoop() {
  if (scanLock) return;

  const video = document.getElementById('v');

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    // 🎯 中间区域裁剪
    const w = video.videoWidth;
    const h = video.videoHeight;

    const rw = w * 0.6;
    const rh = h * 0.3;
    const rx = (w - rw) / 2;
    const ry = (h - rh) / 2;

    canvas.width = rw;
    canvas.height = rh;

    ctx.drawImage(video, rx, ry, rw, rh, 0, 0, rw, rh);

    try {
      const result = zxing.decodeFromCanvas(canvas);

      if (result) {
        scanLock = true;

        stopScanning();

        let code = result.getText();
        code = code.replace(/\s+/g, '').trim();

        handleBarcode(code, true);
        return;
      }

    } catch (e) {
      // 忽略识别失败
    }
  }

  requestAnimationFrame(scanLoop);
}

function stopScanning() {
  scanLock = true;

  const video = document.getElementById('v');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }

  document.getElementById('scanUI').style.display = 'none';
}

// ====== 示例回调（不动你原逻辑） ======
function handleBarcode(code) {
  alert("扫码成功: " + code);
}
</script>

</body>
</html>
